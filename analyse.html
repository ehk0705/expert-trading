<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Trading Pro v2.0 - Analyse & Journal</title>
    <style>
        :root { 
            --bg-color: #0b0e11; 
            --sidebar-bg: #1e2329; 
            --text-main: #eaecef; 
            --text-dim: #848e9c;
            --accent: #2962ff; 
            --yellow-pro: #f0b90b;
            --border: #363c4e; 
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; 
            height: 100vh; 
            margin: 0; 
            background: var(--bg-color); 
            color: var(--text-main); 
            overflow: hidden;
        }

        /* BARRE LATÉRALE */
        .sidebar { 
            width: 350px; 
            border-right: 1px solid var(--border); 
            display: flex;
            flex-direction: column;
            background: var(--sidebar-bg); 
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 { margin: 0; color: var(--yellow-pro); font-size: 18px; font-weight: 800; }

        #gallery-list { 
            flex-grow: 1;
            overflow-y: auto; 
            padding: 15px; 
        }

        /* CONTENU PRINCIPAL */
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            overflow-y: auto;
            align-items: center;
        }

        /* VIGNETTES */
        .thumb-container { 
            margin-bottom: 20px; 
            cursor: pointer; 
            border: 2px solid transparent; 
            border-radius: 6px; 
            overflow: hidden; 
            transition: 0.2s;
            background: #2b3139;
        }
        .thumb-container:hover { border-color: var(--accent); }
        .thumb-container.active { border-color: var(--yellow-pro); }
        .thumb-container img { width: 100%; display: block; height: auto; }
        .thumb-label { padding: 8px; font-size: 11px; text-align: center; color: var(--text-dim); }

        /* VISIONNEUSE */
        #viewer { 
            max-width: 100%; 
            max-height: 65vh;
            border-radius: 4px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
        }

        /* PANNEAU D'INFORMATION ET NOTES */
        .info-panel { 
            margin-top: 20px; 
            background: var(--sidebar-bg); 
            padding: 25px; 
            border-radius: 8px; 
            width: 100%;
            max-width: 900px;
            border: 1px solid var(--border); 
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .meta-item b { color: var(--text-dim); font-size: 11px; text-transform: uppercase; display: block; }
        .meta-item span { font-size: 14px; color: var(--text-main); font-weight: 600; }

        textarea {
            width: 100%;
            height: 150px;
            background: #0b0e11;
            color: #d1d4dc;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }

        textarea:focus { border-color: var(--accent); outline: none; }

        .btn-save {
            margin-top: 15px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-save:hover { background: #1e4bd8; transform: translateY(-1px); }

        .btn-back {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 12px;
            margin-top: 10px;
            display: inline-block;
        }
        .btn-back:hover { color: var(--yellow-pro); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>MES CAPTURES</h2>
            <a href="/" class="btn-back">← RETOUR AU GRAPHIQUE LIVE</a>
        </div>
        <div id="gallery-list">Chargement des fichiers...</div>
    </div>

    <div class="main-content">
        <img id="viewer" src="" alt="Capture plein écran">
        
        <div class="info-panel" id="image-info">
            <h3 style="color: var(--yellow-pro); margin-top: 0; font-size: 18px;">DÉTAILS & ANALYSE TECHNIQUE</h3>
            
            <div id="meta-content">
                <p id="placeholder-text" style="color: var(--text-dim);">Sélectionnez une capture à gauche pour charger les données.</p>
            </div>

            <div id="notes-section" style="display: none;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 12px; font-weight: bold;">NOTES DE L'INGÉNIEUR :</label>
                <textarea id="user-notes" placeholder="Rédigez votre analyse ici (ex: Divergence RSI, support testé...)"></textarea>
                <button class="btn-save" onclick="saveNotes()">ENREGISTRER L'ANALYSE</button>
            </div>
        </div>
    </div>

    <script>
        let currentFileName = "";
        const galleryList = document.getElementById('gallery-list');
        const viewer = document.getElementById('viewer');
        const metaContent = document.getElementById('meta-content');
        const notesSection = document.getElementById('notes-section');
        const userNotes = document.getElementById('user-notes');

        // Charger la galerie au démarrage
        async function loadGallery() {
            try {
                const response = await fetch('/api/list');
                const files = await response.json();

                if (!files || files.length === 0) {
                    galleryList.innerHTML = "<p style='color:var(--text-dim); padding:20px;'>Aucun setup enregistré.</p>";
                    return;
                }

                galleryList.innerHTML = "";
                files.forEach(fileName => {
                    const container = document.createElement('div');
                    container.className = 'thumb-container';
                    container.id = 'thumb-' + fileName.replace('.', '-');
                    
                    container.innerHTML = `
                        <img src="/screenshots/${fileName}" alt="Capture">
                        <div class="thumb-label">${fileName}</div>
                    `;

                    container.onclick = () => selectImage(fileName);
                    galleryList.appendChild(container);
                });
            } catch (error) {
                galleryList.innerHTML = "<p style='color:#f6465d;'>Erreur serveur.</p>";
            }
        }

        // Sélectionner une image et charger ses métadonnées
        async function selectImage(fileName) {
            currentFileName = fileName;
            
            // UI : Activer la vignette
            document.querySelectorAll('.thumb-container').forEach(t => t.classList.remove('active'));
            document.getElementById('thumb-' + fileName.replace('.', '-')).classList.add('active');

            // Affichage image
            viewer.src = `/screenshots/${fileName}`;
            viewer.style.display = "block";
            notesSection.style.display = "block";

            // Charger le JSON associé
            try {
                const jsonName = fileName.replace('.png', '.json');
                const res = await fetch(`/screenshots/${jsonName}`);
                if (res.ok) {
                    const meta = await res.json();
                    metaContent.innerHTML = `
                        <div class="meta-grid">
                            <div class="meta-item"><b>Date de Capture</b><span>${meta.date || 'N/A'}</span></div>
                            <div class="meta-item"><b>Actif</b><span style="color:var(--yellow-pro)">${meta.asset || 'N/A'}</span></div>
                            <div class="meta-item"><b>Intervalle</b><span>${meta.interval || 'N/A'}</span></div>
                        </div>
                    `;
                    userNotes.value = meta.notes || "";
                } else {
                    metaContent.innerHTML = "<p style='color:var(--text-dim);'>Métadonnées non trouvées.</p>";
                    userNotes.value = "";
                }
            } catch (e) {
                console.error("Erreur meta:", e);
            }
        }

        // Sauvegarder les notes dans le fichier JSON sur le serveur
        async function saveNotes() {
            if (!currentFileName) return;
            const notes = userNotes.value;
            const jsonName = currentFileName.replace('.png', '.json');

            try {
                const response = await fetch('/api/update-notes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fileName: jsonName, notes: notes })
                });
                
                if (response.ok) {
                    alert("✅ Analyse technique sauvegardée avec succès.");
                } else {
                    alert("❌ Erreur lors de la sauvegarde.");
                }
            } catch (err) {
                console.error(err);
                alert("❌ Connexion serveur perdue.");
            }
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
