<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Trading Pro v2.0 - Analyse & Journal</title>
    <style>
        :root { 
            --bg-color: #252930; /* Fond éclairci pour plus de clarté */
            --sidebar-bg: #1e2329; 
            --text-main: #eaecef; 
            --text-dim: #848e9c;
            --accent: #2962ff; 
            --yellow-pro: #f0b90b;
            --border: #363c4e; 
            --engineer-green: #00ff41; /* Couleur technique */
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; 
            height: 100vh; 
            margin: 0; 
            background: var(--bg-color); 
            color: var(--text-main); 
            overflow: hidden;
        }

        /* BARRE LATÉRALE */
        .sidebar { 
            width: 320px; 
            border-right: 1px solid var(--border); 
            display: flex;
            flex-direction: column;
            background: var(--sidebar-bg); 
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 { margin: 0; color: var(--yellow-pro); font-size: 16px; font-weight: 800; text-transform: uppercase; }

        #gallery-list { 
            flex-grow: 1;
            overflow-y: auto; 
            padding: 15px; 
        }

        /* CONTENU PRINCIPAL */
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            overflow-y: auto;
            align-items: center;
        }

        /* VIGNETTES */
        .thumb-container { 
            margin-bottom: 15px; 
            cursor: pointer; 
            border: 1px solid var(--border); 
            border-radius: 4px; 
            overflow: hidden; 
            transition: 0.2s;
            background: #161a1e;
        }
        .thumb-container:hover { border-color: var(--accent); }
        .thumb-container.active { border-color: var(--yellow-pro); box-shadow: 0 0 10px rgba(240, 185, 11, 0.2); }
        .thumb-container img { width: 100%; display: block; height: auto; opacity: 0.7; }
        .thumb-container.active img { opacity: 1; }
        .thumb-label { padding: 8px; font-size: 10px; text-align: center; color: var(--text-dim); }

        /* VISIONNEUSE */
        #viewer { 
            max-width: 100%; 
            max-height: 55vh;
            border-radius: 4px; 
            border: 1px solid var(--border);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            display: none;
            margin-bottom: 20px;
        }

        /* PANNEAU D'INFORMATION ET NOTES */
        .info-panel { 
            background: #ffffff; /* Fond blanc pour les notes de l'ingénieur */
            padding: 30px; 
            border-radius: 8px; 
            width: 100%;
            max-width: 950px;
            color: #1e2329;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f1f3f5;
        }

        .meta-item b { color: #787b86; font-size: 10px; text-transform: uppercase; display: block; }
        .meta-item span { font-size: 15px; color: #1e2329; font-weight: 700; }

        /* ZONE NOTES INGENIEUR STYLE STRUCTURE */
        .engineer-container {
            background: #161a1e;
            border-radius: 6px;
            padding: 20px;
            border-left: 5px solid var(--yellow-pro);
        }

        .engineer-container label {
            color: var(--yellow-pro);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: transparent;
            color: var(--engineer-green);
            border: none;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .btn-save {
            margin-top: 20px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-save:hover { background: #1e4bd8; box-shadow: 0 4px 12px rgba(41, 98, 255, 0.3); }

        .btn-back {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 11px;
            margin-top: 10px;
            display: inline-block;
            font-weight: 600;
        }
        .btn-back:hover { color: var(--yellow-pro); }

        .advice-banner {
            background: #e7f0ff;
            border: 1px solid #2962ff;
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1e4bd8;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Journal Technique</h2>
            <a href="/" class="btn-back">← TERMINAL DE TRADING LIVE</a>
        </div>
        <div id="gallery-list">Chargement des fichiers...</div>
    </div>

    <div class="main-content">
        <img id="viewer" src="" alt="Capture plein écran">
        
        <div class="info-panel" id="image-info">
            <div class="advice-banner">
                <strong>💡 RECOMMANDATION :</strong> 
                <span id="dynamic-advice">Sélectionnez une capture pour générer les conseils d'ingénierie.</span>
            </div>

            <div class="meta-grid" id="meta-content">
                <p id="placeholder-text" style="color: #787b86;">En attente de sélection...</p>
            </div>

            <div id="notes-section" style="display: none;">
                <div class="engineer-container">
                    <label> [ MODULE D'ANALYSE DÉCISIONNELLE ]</label>
                    <textarea id="user-notes" placeholder="// --- RAPPORT D'INGÉNIEUR ---
1. ANALYSE STRUCTURELLE (Supports/Résistances) :

2. ÉVALUATION DES RISQUES :

3. RECOMMANDATIONS TECHNIQUES :"></textarea>
                </div>
                <button class="btn-save" onclick="saveNotes()">VALIDER & ARCHIVER L'ANALYSE</button>
            </div>
        </div>
    </div>

    <script>
        let currentFileName = "";
        const galleryList = document.getElementById('gallery-list');
        const viewer = document.getElementById('viewer');
        const metaContent = document.getElementById('meta-content');
        const notesSection = document.getElementById('notes-section');
        const userNotes = document.getElementById('user-notes');
        const adviceText = document.getElementById('dynamic-advice');

        const adviceList = [
            "Surveillez la confluence entre le RSI et les zones de liquidité avant toute entrée.",
            "La structure de marché prime sur l'indicateur. Identifiez d'abord le biais directionnel.",
            "En cas de forte volatilité, privilégiez les unités de temps supérieures (H4/D1) pour filtrer le bruit.",
            "Un setup sans zone de Stop-Loss définie est une erreur d'ingénierie critique."
        ];

        async function loadGallery() {
            try {
                const response = await fetch('/api/list');
                const files = await response.json();

                if (!files || files.length === 0) {
                    galleryList.innerHTML = "<p style='color:var(--text-dim); padding:20px;'>Aucun setup archivé.</p>";
                    return;
                }

                galleryList.innerHTML = "";
                files.forEach(fileName => {
                    const container = document.createElement('div');
                    container.className = 'thumb-container';
                    container.id = 'thumb-' + fileName.replace('.', '-');
                    container.innerHTML = `
                        <img src="/screenshots/${fileName}" alt="Capture">
                        <div class="thumb-label">${fileName}</div>
                    `;
                    container.onclick = () => selectImage(fileName);
                    galleryList.appendChild(container);
                });
            } catch (error) {
                galleryList.innerHTML = "<p style='color:#f6465d;'>Erreur de liaison serveur.</p>";
            }
        }

        async function selectImage(fileName) {
            currentFileName = fileName;
            document.querySelectorAll('.thumb-container').forEach(t => t.classList.remove('active'));
            document.getElementById('thumb-' + fileName.replace('.', '-')).classList.add('active');

            viewer.src = `/screenshots/${fileName}`;
            viewer.style.display = "block";
            notesSection.style.display = "block";
            
            // Random advice generator
            adviceText.innerText = adviceList[Math.floor(Math.random() * adviceList.length)];

            try {
                const jsonName = fileName.replace('.png', '.json');
                const res = await fetch(`/screenshots/${jsonName}`);
                if (res.ok) {
                    const meta = await res.json();
                    metaContent.innerHTML = `
                        <div class="meta-item"><b>Date</b><span>${meta.date || 'N/A'}</span></div>
                        <div class="meta-item"><b>Actif</b><span style="color:var(--accent)">${meta.asset || 'N/A'}</span></div>
                        <div class="meta-item"><b>Intervalle</b><span>${meta.interval || 'N/A'}</span></div>
                    `;
                    userNotes.value = meta.notes || "// --- RAPPORT D'INGÉNIEUR ---\n1. ANALYSE STRUCTURELLE :\n\n2. ÉVALUATION DES RISQUES :\n\n3. RECOMMANDATIONS TECHNIQUES :";
                }
            } catch (e) {
                console.error("Erreur meta:", e);
            }
        }

        async function saveNotes() {
            if (!currentFileName) return;
            const notes = userNotes.value;
            const jsonName = currentFileName.replace('.png', '.json');

            try {
                const response = await fetch('/api/update-notes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fileName: jsonName, notes: notes })
                });
                
                if (response.ok) {
                    alert("✅ Rapport d'ingénierie archivé.");
                } else {
                    alert("❌ Échec de l'archivage.");
                }
            } catch (err) {
                alert("❌ Erreur de communication serveur.");
            }
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
