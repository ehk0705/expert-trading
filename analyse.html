<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Trading Pro v2.0 - Analyse & Journal</title>
    <style>
        :root { 
            --bg-color: #252930; 
            --sidebar-bg: #1e2329; 
            --text-main: #eaecef; 
            --text-dim: #848e9c;
            --accent: #2962ff; 
            --yellow-pro: #f0b90b;
            --border: #363c4e; 
            --engineer-green: #00ff41;
            --buy-green: #2ebd85;
            --sell-red: #f6465d;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; height: 100vh; margin: 0; 
            background: var(--bg-color); color: var(--text-main); overflow: hidden;
        }

        .sidebar { width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--sidebar-bg); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { margin: 0; color: var(--yellow-pro); font-size: 16px; font-weight: 800; text-transform: uppercase; }
        #gallery-list { flex-grow: 1; overflow-y: auto; padding: 15px; }

        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; align-items: center; }

        .thumb-container { margin-bottom: 15px; cursor: pointer; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: 0.2s; background: #161a1e; }
        .thumb-container:hover { border-color: var(--accent); }
        .thumb-container.active { border-color: var(--yellow-pro); box-shadow: 0 0 10px rgba(240, 185, 11, 0.2); }
        .thumb-container img { width: 100%; display: block; height: auto; opacity: 0.7; }
        .thumb-container.active img { opacity: 1; }
        .thumb-label { padding: 8px; font-size: 10px; text-align: center; color: var(--text-dim); }

        #viewer { max-width: 100%; max-height: 50vh; border-radius: 4px; border: 1px solid var(--border); box-shadow: 0 15px 40px rgba(0,0,0,0.6); display: none; margin-bottom: 20px; }

        .info-panel { background: #ffffff; padding: 30px; border-radius: 8px; width: 100%; max-width: 950px; color: #1e2329; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

        /* NOUVEAU : DASHBOARD IA */
        .ai-dashboard { display: grid; grid-template-columns: 200px 1fr; gap: 20px; margin-bottom: 25px; display: none; }
        .ai-card { background: #f8fafc; border: 1px solid #dcdfe4; border-radius: 8px; padding: 15px; text-align: center; }
        .ai-logs { background: #161a1e; color: var(--engineer-green); border-radius: 8px; padding: 15px; font-family: 'Consolas', monospace; font-size: 12px; overflow: hidden; }
        
        .confidence-bar-container { background: #edf2f7; height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .confidence-bar { height: 100%; width: 0%; background: var(--accent); transition: width 1s ease-in-out; }

        .meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f1f3f5; }
        .meta-item b { color: #787b86; font-size: 10px; text-transform: uppercase; display: block; }
        .meta-item span { font-size: 15px; color: #1e2329; font-weight: 700; }

        .engineer-container { background: #161a1e; border-radius: 6px; padding: 20px; border-left: 5px solid var(--yellow-pro); }
        .engineer-container label { color: var(--yellow-pro); font-size: 12px; font-weight: 800; letter-spacing: 1px; display: block; margin-bottom: 10px; }

        textarea { width: 100%; height: 200px; background: transparent; color: var(--engineer-green); border: none; font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-analyze { background: var(--yellow-pro); color: #000; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; font-weight: 800; text-transform: uppercase; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; font-weight: 800; text-transform: uppercase; }
        
        .loading-spinner { display: none; color: var(--accent); font-weight: bold; font-size: 12px; }

        .advice-banner { background: #e7f0ff; border: 1px solid #2962ff; padding: 10px 15px; border-radius: 4px; margin-bottom: 20px; font-size: 13px; color: #1e4bd8; display: flex; align-items: center; gap: 10px; }
        .btn-back { text-decoration: none; color: var(--text-dim); font-size: 11px; margin-top: 10px; display: inline-block; font-weight: 600; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Journal Technique</h2>
            <a href="/" class="btn-back">← TERMINAL DE TRADING LIVE</a>
        </div>
        <div id="gallery-list">Chargement des fichiers...</div>
    </div>

    <div class="main-content">
        <img id="viewer" src="" alt="Capture plein écran">
        
        <div class="info-panel" id="image-info">
            <div class="advice-banner">
                <strong>💡 RECOMMANDATION :</strong> 
                <span id="dynamic-advice">Sélectionnez une capture pour générer les conseils d'ingénierie.</span>
            </div>

            <div class="meta-grid" id="meta-content">
                <p id="placeholder-text" style="color: #787b86;">En attente de sélection...</p>
            </div>

            <div class="ai-dashboard" id="ai-panel">
                <div class="ai-card">
                    <b style="font-size: 10px; color: var(--text-dim);">DÉCISION IA</b>
                    <div id="ai-decision" style="font-size: 22px; font-weight: 900; margin: 10px 0;">--</div>
                    <div class="confidence-bar-container">
                        <div class="confidence-bar" id="ai-bar"></div>
                    </div>
                    <span id="ai-percent" style="font-size: 12px; font-weight: 800; color: var(--accent);">0%</span>
                </div>
                <div class="ai-logs" id="ai-reasoning">> En attente du déclenchement de l'analyse...</div>
            </div>

            <div id="notes-section" style="display: none;">
                <div class="engineer-container">
                    <label> [ MODULE D'ANALYSE DÉCISIONNELLE ]</label>
                    <textarea id="user-notes" placeholder="Rapport technique..."></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn-analyze" id="btn-trigger-ai" onclick="triggerAIAnalysis()">🚀 Analyser</button>
                    <button class="btn-save" onclick="saveNotes()">ARCHIVER LE RAPPORT</button>
                    <span class="loading-spinner" id="spinner">ANALYSE EN COURS...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentFileName = "";
        const viewer = document.getElementById('viewer');
        const metaContent = document.getElementById('meta-content');
        const notesSection = document.getElementById('notes-section');
        const userNotes = document.getElementById('user-notes');

        async function loadGallery() {
            try {
                const response = await fetch('/api/list');
                const files = await response.json();
                const galleryList = document.getElementById('gallery-list');
                if (!files || files.length === 0) {
                    galleryList.innerHTML = "<p style='color:var(--text-dim); padding:20px;'>Aucun setup archivé.</p>";
                    return;
                }
                galleryList.innerHTML = "";
                files.forEach(fileName => {
                    const container = document.createElement('div');
                    container.className = 'thumb-container';
                    container.id = 'thumb-' + fileName.replace('.', '-');
                    container.innerHTML = `<img src="/screenshots/${fileName}"><div class="thumb-label">${fileName}</div>`;
                    container.onclick = () => selectImage(fileName);
                    galleryList.appendChild(container);
                });
            } catch (error) { console.error(error); }
        }

        async function selectImage(fileName) {
            currentFileName = fileName;
            document.querySelectorAll('.thumb-container').forEach(t => t.classList.remove('active'));
            document.getElementById('thumb-' + fileName.replace('.', '-')).classList.add('active');

            viewer.src = `/screenshots/${fileName}`;
            viewer.style.display = "block";
            notesSection.style.display = "block";
            document.getElementById('ai-panel').style.display = "grid";

            try {
                const jsonName = fileName.replace('.png', '.json');
                const res = await fetch(`/screenshots/${jsonName}`);
                if (res.ok) {
                    const meta = await res.json();
                    metaContent.innerHTML = `
                        <div class="meta-item"><b>Date</b><span>${meta.date || 'N/A'}</span></div>
                        <div class="meta-item"><b>Actif</b><span style="color:var(--accent)">${meta.asset || 'N/A'}</span></div>
                        <div class="meta-item"><b>Intervalle</b><span>${meta.interval || 'N/A'}</span></div>
                    `;
                    userNotes.value = meta.notes || "// --- RAPPORT D'INGÉNIEUR ---\n1. ANALYSE STRUCTURELLE :\n\n2. ÉVALUATION DES RISQUES :\n\n3. RECOMMANDATIONS TECHNIQUES :";
                    
                    // Si l'IA a déjà analysé (données présentes dans le JSON)
                    if(meta.ai_analysis) renderAIResults(meta.ai_analysis);
                }
            } catch (e) { console.error(e); }
        }

        async function triggerAIAnalysis() {
            const btn = document.getElementById('btn-trigger-ai');
            const spinner = document.getElementById('spinner');
            btn.style.display = "none";
            spinner.style.display = "inline";

            try {
                // Appel vers votre server.js qui communique avec Gemini/OpenAI Vision
                const response = await fetch('/api/analyze-vision', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fileName: currentFileName })
                });

                if (response.ok) {
                    const data = await response.json();
                    renderAIResults(data.analysis);
                    // On injecte automatiquement le résultat dans les notes
                    userNotes.value += `\n\n[IA DECISION]: ${data.analysis.decision}\n[CONFIANCE]: ${data.analysis.confidence}%\n[REASON]: ${data.analysis.reasoning}`;
                }
            } catch (err) {
                alert("Erreur lors de l'analyse IA.");
            } finally {
                btn.style.display = "inline";
                spinner.style.display = "none";
            }
        }

        function renderAIResults(data) {
            const decisionEl = document.getElementById('ai-decision');
            const barEl = document.getElementById('ai-bar');
            
            decisionEl.innerText = data.decision;
            decisionEl.style.color = data.decision === "ACHETER" ? "var(--buy-green)" : (data.decision === "VENDRE" ? "var(--sell-red)" : "var(--yellow-pro)");
            
            barEl.style.width = data.confidence + "%";
            document.getElementById('ai-percent').innerText = data.confidence + "%";
            document.getElementById('ai-reasoning').innerText = "> ANALYSE TERMINÉE :\n" + data.reasoning;
        }

        async function saveNotes() {
            if (!currentFileName) return;
            const response = await fetch('/api/update-notes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fileName: currentFileName.replace('.png', '.json'), notes: userNotes.value })
            });
            if (response.ok) alert("✅ Rapport archivé.");
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
