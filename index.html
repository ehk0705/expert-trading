<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Trading Pro v2.0 - Full Interface</title>

    <!-- Bibliothèque locale capturable -->
    <!--<script src="https://s3.tradingview.com/tv.js"></script>-->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <link rel="stylesheet" href="style.css">

    <style>
        /* Sécurité minimale si style.css ne définit pas ces blocs */
        #chart-container {
            flex: 1 1 auto;
            width: 100%;
            min-height: 520px;
            background: #020617;
            position: relative;
            border-top: 1px solid #263244;
            padding: 12px;
        }

        #tradingview_chart {
            width: 100%;
            height: 100%;
            min-height: 500px;
            border-radius: 10px;
            overflow: hidden;
            background: #020617;
            border: 1px solid #263244;
        }

        .chart-message {
            position: absolute;
            left: 24px;
            top: 24px;
            z-index: 2;
            color: #facc15;
            background: rgba(2, 6, 23, 0.84);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            max-width: calc(100% - 48px);
        }
    </style>
</head>

<body>

    <div class="header-pro">
        <div class="control-group">
            <button class="btn-capture" id="btn-capture" onclick="takeScreenshot()">📷 CAPTURE</button>
            <input type="file" id="screenshot-file" accept="image/png,image/jpeg,image/webp">
            <button class="btn-vision" id="btn-vision" onclick="analyserVisionMarche()">Vision + Marché</button>
        </div>

        <div class="control-group">
            <label for="asset-selector">ACTIF :</label>
            <select id="asset-selector" onchange="actualiserGraphique()">
                <option value="BINANCE:BTCUSDT">BTC/USDT</option>
                <option value="COINBASE:BTCUSD">BTC/USD</option>
                <option value="BINANCE:ETHUSDT">ETH/USDT</option>
                <option value="BINANCE:SOLUSDT">SOL/USDT</option>
                <option value="BINANCE:BNBUSDT">BNB/USDT</option>
                <option value="BINANCE:XRPUSDT">XRP/USDT</option>
                <option value="OANDA:XAUUSD">OR (XAU)</option>
                <option value="NASDAQ:AAPL">AAPL</option>
                <option value="NASDAQ:TSLA">TSLA</option>
                <option value="NASDAQ:NVDA">NVDA</option>
                <option value="NASDAQ:MSFT">MSFT</option>
                <option value="NASDAQ:AMZN">AMZN</option>
                <option value="NASDAQ:GOOGL">GOOGL</option>
                <option value="SP:SPX">S&P 500</option>
                <option value="TVC:DXY">DXY</option>
            </select>
        </div>

        <div class="control-group">
            <label for="categorie-analyse-btc">ANALYSE :</label>
            <select id="categorie-analyse-btc">
                <option value="macro">Macro</option>
                <option value="monnaie">Monnaie</option>
                <option value="onchain">On-chain</option>
                <option value="minage">Minage</option>
                <option value="technique" selected>Technique</option>
                <option value="derives">Dérivés</option>
                <option value="liquidite">Liquidité</option>
                <option value="inst">Inst.</option>
                <option value="sentiment">Sentiment</option>
                <option value="risques">Risques</option>
            </select>
        </div>

        <h1>EXPERT TRADING PRO</h1>

        <div class="control-group">
            <label for="chart-type-selector">STYLE :</label>
            <select id="chart-type-selector" onchange="changerStyleGraphique()">
                <option value="candles" selected>Bougies</option>
                <option value="bars">Barres</option>
                <option value="line">Ligne</option>
                <option value="area">Aire</option>
            </select>
        </div>

        <div class="control-group">
            <label for="indicator-selector">IND :</label>
            <select id="indicator-selector" onchange="actualiserGraphique()">
                <option value="EMA">EMA</option>
                <option value="RSI">RSI</option>
                <option value="MACD">MACD</option>
                <option value="SUPERTREND">ST</option>
                <option value="BOLLINGER">BB</option>
                <option value="ATR">ATR</option>
                <option value="VOLUME">VOL</option>
                <option value="LIQUIDITY">LIQ</option>
            </select>
        </div>

        <div class="control-group">
            <label for="interval-selector">INT :</label>
            <select id="interval-selector" onchange="actualiserGraphique()">
                <option value="1">1m</option>
                <option value="5">5m</option>
                <option value="15">15m</option>
                <option value="30">30m</option>
                <option value="60">1h</option>
                <option value="240">4h</option>
                <option value="D" selected>1J</option>
                <option value="W">1S</option>
                <option value="M">1M</option>
            </select>
        </div>

        <div class="control-group">
            <button class="btn-technique" onclick="testerAnalyseTechnique()">Tester technique</button>

            <button class="btn-tv" type="button" onclick="ouvrirTradingView()">Ouvrir TV</button>

            <a href="analyse.html" title="Analyser la capture">
                <button type="button">Analyser</button>
            </a>

           <button class="btn-effacer" type="button" onclick="viderCaptures()">
				Vider les captures
		   </button>
        </div>
    </div>

    <div id="chart-container">
        <div id="chart-message" class="chart-message">Chargement du graphique local...</div>
        <div id="tradingview_chart"></div>
    </div>

    <div class="result-panel" id="result-panel">
        <div class="result-header">
            <strong>Résultat IA</strong>
            <button type="button" onclick="togglePanel()">Masquer / afficher</button>
        </div>

        <div id="status" class="status-line">Prêt.</div>
        <pre id="resultat-analyse">Aucune analyse lancée.</pre>
    </div>

    <script>
        const API_BASE_URL = window.location.hostname.includes("github.io")
            ? "https://expert-trading.onrender.com"
            : "";

        const API_BASE_URL_SECOURS = "https://trading-g8ie.onrender.com";

        let chart = null;
        let mainSeries = null;
        let currentData = [];
        let dernierScreenshotBase64 = null;
        let derniereSourceMarche = null;

        function getApiUrl(route) {
            return API_BASE_URL + route;
        }

        function getChartSize() {
            const container = document.getElementById("tradingview_chart") || document.getElementById("chart-container");
            const rect = container.getBoundingClientRect();

            return {
                width: Math.max(320, Math.floor(rect.width || window.innerWidth)),
                height: Math.max(420, Math.floor(rect.height || (window.innerHeight - 80)))
            };
        }

        function afficherMessageGraphique(message, type) {
            const zone = document.getElementById("chart-message");
            if (!zone) return;

            zone.textContent = message || "";
            zone.style.display = message ? "block" : "none";

            if (type === "erreur") {
                zone.style.color = "#fecaca";
                zone.style.borderColor = "#7f1d1d";
            } else if (type === "ok") {
                zone.style.color = "#86efac";
                zone.style.borderColor = "#064e3b";
            } else {
                zone.style.color = "#facc15";
                zone.style.borderColor = "#334155";
            }
        }

        function appliquerThemeGraphiqueTradingView() {
            if (!chart) return;

            chart.applyOptions({
                layout: {
                    background: { type: "solid", color: "#020617" },
                    textColor: "#d1d5db"
                },
                grid: {
                    vertLines: { color: "#1f2937" },
                    horzLines: { color: "#1f2937" }
                },
                rightPriceScale: {
                    borderColor: "#334155"
                },
                timeScale: {
                    borderColor: "#334155",
                    timeVisible: true,
                    secondsVisible: false
                }
            });
        }

        function init() {
            if (typeof LightweightCharts === "undefined") {
                afficherMessageGraphique("La bibliothèque lightweight-charts n'est pas chargée.", "erreur");
                afficherStatus("Erreur : bibliothèque graphique absente.");
                return;
            }

            creerGraphiqueLightweight();
            appliquerThemeGraphiqueTradingView();
            actualiserGraphique();
        }

        function afficherStatus(message) {
            const status = document.getElementById("status");
            if (status) status.textContent = message;
        }

        function afficherResultat(data) {
            const zone = document.getElementById("resultat-analyse");
            if (!zone) return;

            zone.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
        }

        function togglePanel() {
            const zone = document.getElementById("resultat-analyse");
            const status = document.getElementById("status");

            if (!zone || !status) return;

            zone.classList.toggle("hidden");
            status.classList.toggle("hidden");
        }

        function effacerResultat() {
            afficherResultat("Aucune analyse lancée.");
            afficherStatus("Résultat effacé.");
        }

        function setBoutonsActifs(actif) {
            ["btn-capture", "btn-vision"].forEach(id => {
                const bouton = document.getElementById(id);
                if (bouton) bouton.disabled = !actif;
            });
        }

        async function lireReponseJson(response) {
            const texte = await response.text();

            let data;
            try {
                data = JSON.parse(texte);
            } catch (erreur) {
                throw new Error(
                    "Le serveur n'a pas retourné du JSON valide.\n\n" +
                    "Statut HTTP : " + response.status + "\n\n" +
                    texte
                );
            }

            if (!response.ok || data.ok === false) {
                throw new Error(
                    data.details ||
                    data.message ||
                    data.error ||
                    ("Erreur HTTP " + response.status)
                );
            }

            return data;
        }

        function nettoyerNomFichier(valeur) {
            return String(valeur || "non-defini")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-zA-Z0-9-_]/g, "-")
                .replace(/-+/g, "-")
                .replace(/^-|-$/g, "");
        }

        function genererTimestampFichier() {
            const maintenant = new Date();
            const annee = maintenant.getFullYear();
            const mois = String(maintenant.getMonth() + 1).padStart(2, "0");
            const jour = String(maintenant.getDate()).padStart(2, "0");
            const heure = String(maintenant.getHours()).padStart(2, "0");
            const minute = String(maintenant.getMinutes()).padStart(2, "0");
            const seconde = String(maintenant.getSeconds()).padStart(2, "0");
            return annee + mois + jour + "-" + heure + minute + seconde;
        }

        function creerPayloadCapturePostgres(configuration) {
            const nomCapture =
                nettoyerNomFichier(configuration.actif) + "-" +
                nettoyerNomFichier(configuration.indicateur) + "-" +
                nettoyerNomFichier(configuration.categorieAnalyseLibelle) + "-" +
                genererTimestampFichier();

            const imageCapture =
                dernierScreenshotBase64 ||
                configuration?.snapshot?.screenshotBase64 ||
                configuration?.screenshot_base64 ||
                null;

            return {
                actif: configuration.actif || "NON_RENSEIGNE",
                indicateur: configuration.indicateur || null,
                intervalle: configuration.intervalle || null,
                actif_libelle: configuration.actif || null,
                indicateur_libelle: configuration.indicateur || null,
                intervalle_libelle: configuration.intervalle || null,
                source_parametres: "lightweight_charts_canvas",
                lecture_directe_graphique: false,
                type_bougie: configuration.style || null,
                type_bougie_libelle: configuration.style || null,
                nom_fichier: nomCapture,
                nom_capture: nomCapture,
                categorie_analyse: configuration.categorieAnalyseLibelle || configuration.categorieAnalyse || "Analyse technique",
                categorieAnalyse: configuration.categorieAnalyseLibelle || configuration.categorieAnalyse || "Analyse technique",
                configuration_json: configuration,
                screenshot_base64: imageCapture,
                screenshotBase64: imageCapture,
                image: imageCapture
            };
        }

        function obtenirUrlsSauvegardeCapture() {
            const urls = [];

            if (API_BASE_URL) {
                urls.push(API_BASE_URL + "/api/captures");
            }

            urls.push(API_BASE_URL_SECOURS + "/api/captures");
            urls.push("/api/captures");

            return [...new Set(urls)];
        }

        async function enregistrerConfigurationSurServeur(configuration) {
            const payloadCapture = creerPayloadCapturePostgres(configuration);
            const urls = obtenirUrlsSauvegardeCapture();
            let derniereErreur = null;

            for (const url of urls) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        mode: "cors",
                        credentials: "omit",
                        cache: "no-store",
                        headers: {
                            "Content-Type": "application/json",
                            "Accept": "application/json"
                        },
                        body: JSON.stringify(payloadCapture)
                    });

                    const data = await lireReponseJson(response);

                    return {
                        ok: true,
                        routeUtilisee: url,
                        payloadEnvoye: payloadCapture,
                        reponseServeur: data
                    };
                } catch (erreur) {
                    derniereErreur = erreur;
                    console.warn("Sauvegarde échouée sur", url, erreur);
                }
            }

            throw new Error(
                "Aucune route de sauvegarde n'a accepté la configuration. Dernière erreur : " +
                (derniereErreur ? derniereErreur.message : "inconnue")
            );
        }

        function obtenirConfiguration() {
            const cat = document.getElementById("categorie-analyse-btc");
            const catText = cat.options[cat.selectedIndex].text;

            const actif = document.getElementById("asset-selector").value;
            const intervalle = document.getElementById("interval-selector").value;
            const indicateur = document.getElementById("indicator-selector").value;
            const style = document.getElementById("chart-type-selector").value;

            return {
                nom: "Expert Trading Pro v2.0",
                actif: actif,
                intervalle: intervalle,
                indicateur: indicateur,
                categorieAnalyse: document.getElementById("categorie-analyse-btc").value,
                categorieAnalyseLibelle: catText,
                style: style,
                graphique: {
                    actif: actif,
                    intervalle: intervalle,
                    indicateur: indicateur,
                    style: style,
                    source: "lightweight_charts_canvas"
                },
                marcheLocal: {
                    derniereBougie: currentData.length ? currentData[currentData.length - 1] : null,
                    nombreBougies: currentData.length,
                    source: derniereSourceMarche
                },
                tradingView: {
                    widgetPresent: false,
                    bibliotheque: "lightweight-charts",
                    theme: "dark",
                    capturable: true
                },
                snapshot: {
                    screenshotBase64: dernierScreenshotBase64 || null
                },
                dateConfiguration: new Date().toISOString()
            };
        }

        function convertirIntervallePourBinance(intervalleTradingView) {
            const interval = String(intervalleTradingView || "60");

            if (interval === "60") return "1h";
            if (interval === "240") return "4h";
            if (interval === "D") return "1d";
            if (interval === "W") return "1w";
            if (interval === "M") return "1M";
            if (!isNaN(interval)) return interval + "m";

            return interval;
        }

        function convertirIntervallePourOkx(intervalleTradingView) {
            const interval = String(intervalleTradingView || "60");

            if (interval === "1") return "1m";
            if (interval === "5") return "5m";
            if (interval === "15") return "15m";
            if (interval === "30") return "30m";
            if (interval === "60") return "1H";
            if (interval === "240") return "4H";
            if (interval === "D") return "1D";
            if (interval === "W") return "1W";
            if (interval === "M") return "1M";

            return "1H";
        }

        function obtenirSymboleBinanceDepuisActif(actif) {
            const brut = String(actif || "BINANCE:BTCUSDT").toUpperCase();

            if (brut.includes("BINANCE:")) return brut.split(":")[1];

            if (brut.includes("BTC")) return "BTCUSDT";
            if (brut.includes("ETH")) return "ETHUSDT";
            if (brut.includes("SOL")) return "SOLUSDT";
            if (brut.includes("BNB")) return "BNBUSDT";
            if (brut.includes("XRP")) return "XRPUSDT";

            return "BTCUSDT";
        }

        function obtenirSymboleOkxDepuisActif(actif) {
            const brut = String(actif || "BINANCE:BTCUSDT").toUpperCase();

            if (brut.includes("ETH")) return "ETH-USDT";
            if (brut.includes("SOL")) return "SOL-USDT";
            if (brut.includes("BNB")) return "BNB-USDT";
            if (brut.includes("XRP")) return "XRP-USDT";
            if (brut.includes("BTC")) return "BTC-USDT";

            return "BTC-USDT";
        }

        function actifCompatibleCrypto(actif) {
            const brut = String(actif || "").toUpperCase();
            return (
                brut.includes("BTC") ||
                brut.includes("ETH") ||
                brut.includes("SOL") ||
                brut.includes("BNB") ||
                brut.includes("XRP")
            );
        }

        function creerGraphiqueLightweight() {
            const conteneur = document.getElementById("tradingview_chart");
            if (!conteneur) return;

            conteneur.innerHTML = "";

            const size = getChartSize();

            chart = LightweightCharts.createChart(conteneur, {
                width: size.width,
                height: size.height,
                layout: {
                    background: { type: "solid", color: "#020617" },
                    textColor: "#d1d5db"
                },
                grid: {
                    vertLines: { color: "#1f2937" },
                    horzLines: { color: "#1f2937" }
                },
                rightPriceScale: {
                    borderColor: "#334155"
                },
                timeScale: {
                    borderColor: "#334155",
                    timeVisible: true,
                    secondsVisible: false
                }
            });

            changerStyleGraphique(false);
            appliquerThemeGraphiqueTradingView();
        }

        function changerStyleGraphique(rechargerDonnees = true) {
            if (!chart) return;

            const type = document.getElementById("chart-type-selector").value;

            if (mainSeries) {
                chart.removeSeries(mainSeries);
                mainSeries = null;
            }

            const commonOptions = {
                priceFormat: {
                    type: "price",
                    precision: 2,
                    minMove: 0.01
                }
            };

            if (type === "candles") {
                mainSeries = chart.addCandlestickSeries({
                    ...commonOptions,
                    upColor: "#26a69a",
                    downColor: "#ef5350",
                    borderUpColor: "#26a69a",
                    borderDownColor: "#ef5350",
                    wickUpColor: "#26a69a",
                    wickDownColor: "#ef5350"
                });
            } else if (type === "bars") {
                mainSeries = chart.addBarSeries({
                    ...commonOptions,
                    upColor: "#26a69a",
                    downColor: "#ef5350"
                });
            } else if (type === "line") {
                mainSeries = chart.addLineSeries({
                    ...commonOptions,
                    color: "#38bdf8",
                    lineWidth: 2
                });
            } else if (type === "area") {
                mainSeries = chart.addAreaSeries({
                    ...commonOptions,
                    topColor: "rgba(56, 189, 248, 0.30)",
                    bottomColor: "rgba(2, 6, 23, 0.05)",
                    lineColor: "#38bdf8",
                    lineWidth: 2
                });
            }

            if (currentData.length > 0 && mainSeries) {
                mainSeries.setData(currentData);
                chart.timeScale().fitContent();
            }

            appliquerThemeGraphiqueTradingView();

            if (rechargerDonnees) {
                actualiserGraphique();
            }
        }

        async function chargerDonneesBinance(actif, intervalle) {
            const symbole = obtenirSymboleBinanceDepuisActif(actif);
            const interval = convertirIntervallePourBinance(intervalle);

            const response = await fetch(
                "https://api.binance.com/api/v3/klines?symbol=" +
                encodeURIComponent(symbole) +
                "&interval=" +
                encodeURIComponent(interval) +
                "&limit=500"
            );

            const data = await response.json();

            if (!response.ok || !Array.isArray(data)) {
                throw new Error("Binance indisponible : " + JSON.stringify(data));
            }

            return {
                source: "binance",
                symbole: symbole,
                data: data.map(d => ({
                    time: Math.floor(Number(d[0]) / 1000),
                    open: Number(d[1]),
                    high: Number(d[2]),
                    low: Number(d[3]),
                    close: Number(d[4]),
                    value: Number(d[4])
                }))
            };
        }

        async function chargerDonneesOkx(actif, intervalle) {
            const symbole = obtenirSymboleOkxDepuisActif(actif);
            const bar = convertirIntervallePourOkx(intervalle);

            const response = await fetch(
                "https://www.okx.com/api/v5/market/candles?instId=" +
                encodeURIComponent(symbole) +
                "&bar=" +
                encodeURIComponent(bar) +
                "&limit=300"
            );

            const json = await response.json();

            if (!response.ok || json.code !== "0" || !Array.isArray(json.data)) {
                throw new Error("OKX indisponible : " + JSON.stringify(json));
            }

            return {
                source: "okx",
                symbole: symbole,
                data: json.data
                    .slice()
                    .reverse()
                    .map(d => ({
                        time: Math.floor(Number(d[0]) / 1000),
                        open: Number(d[1]),
                        high: Number(d[2]),
                        low: Number(d[3]),
                        close: Number(d[4]),
                        value: Number(d[4])
                    }))
            };
        }

        async function actualiserGraphique() {
            const actif = document.getElementById("asset-selector").value;
            const intervalle = document.getElementById("interval-selector").value;

            if (!chart) creerGraphiqueLightweight();
            if (!mainSeries) changerStyleGraphique(false);

            if (!actifCompatibleCrypto(actif)) {
                afficherMessageGraphique(
                    "Cet affichage local ne récupère automatiquement que BTC, ETH, SOL, BNB et XRP. Pour les autres actifs, utiliser le bouton Ouvrir TV.",
                    "erreur"
                );
                afficherStatus("Actif non compatible avec les données crypto locales.");
                return;
            }

            afficherMessageGraphique("Chargement des données de marché...", "attente");
            afficherStatus("Chargement du graphique...");

            const erreurs = [];

            try {
                let resultat;

                try {
                    resultat = await chargerDonneesBinance(actif, intervalle);
                } catch (erreurBinance) {
                    erreurs.push(erreurBinance.message);
                    resultat = await chargerDonneesOkx(actif, intervalle);
                }

                currentData = resultat.data;
                derniereSourceMarche = {
                    source: resultat.source,
                    symbole: resultat.symbole
                };

                if (!currentData.length) {
                    throw new Error("Aucune bougie reçue.");
                }

                if (mainSeries) mainSeries.setData(currentData);

                chart.timeScale().fitContent();
                appliquerThemeGraphiqueTradingView();

                afficherMessageGraphique("", "ok");
                afficherStatus(
                    "Graphique chargé : " +
                    resultat.symbole +
                    " / source : " +
                    resultat.source +
                    (erreurs.length ? " / Binance indisponible, repli OKX." : "")
                );

            } catch (erreur) {
                console.error("Erreur graphique :", erreur);
                afficherMessageGraphique("Impossible de charger le graphique : " + erreur.message, "erreur");
                afficherStatus("Erreur graphique : " + erreur.message);
            }
        }

        function ouvrirTradingView() {
            const symbole = document.getElementById("asset-selector").value || "BINANCE:BTCUSDT";
            const intervalle = document.getElementById("interval-selector").value || "D";
            const url = "https://www.tradingview.com/chart/?symbol=" + encodeURIComponent(symbole) + "&interval=" + encodeURIComponent(intervalle);
            window.open(url, "_blank");
        }

        async function convertirFichierImageEnBase64(fichier) {
            return await new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error("Impossible de lire le fichier image."));

                reader.readAsDataURL(fichier);
            });
        }

        function capturerCanvasEnBase64() {
            const zone = document.getElementById("tradingview_chart") || document.getElementById("chart-container");
            if (!zone) throw new Error("Zone du graphique introuvable.");

            const canvases = Array.from(zone.querySelectorAll("canvas"));
            if (!canvases.length) throw new Error("Canvas du graphique introuvable.");

            /*
                lightweight-charts utilise souvent plusieurs canvas superposés.
                Capturer seulement le premier canvas peut produire une image vide ou partielle.
                On recompose donc tous les canvas visibles dans une seule image PNG.
            */
            const zoneRect = zone.getBoundingClientRect();
            const largeur = Math.max(320, Math.round(zoneRect.width || zone.clientWidth || 800));
            const hauteur = Math.max(320, Math.round(zoneRect.height || zone.clientHeight || 520));
            const ratio = Math.max(1, window.devicePixelRatio || 1);

            const sortie = document.createElement("canvas");
            sortie.width = Math.round(largeur * ratio);
            sortie.height = Math.round(hauteur * ratio);

            const ctx = sortie.getContext("2d");
            ctx.scale(ratio, ratio);
            ctx.fillStyle = "#020617";
            ctx.fillRect(0, 0, largeur, hauteur);

            canvases.forEach(canvas => {
                const rect = canvas.getBoundingClientRect();
                const x = rect.left - zoneRect.left;
                const y = rect.top - zoneRect.top;

                if (rect.width > 0 && rect.height > 0) {
                    ctx.drawImage(canvas, x, y, rect.width, rect.height);
                }
            });

            return sortie.toDataURL("image/png");
        }

        async function obtenirImagePourAnalyse() {
            const input = document.getElementById("screenshot-file");

            if (input && input.files && input.files.length > 0) {
                return await convertirFichierImageEnBase64(input.files[0]);
            }

            if (dernierScreenshotBase64) return dernierScreenshotBase64;

            return capturerCanvasEnBase64();
        }

        async function takeScreenshot() {
            try {
                afficherStatus("Capture du graphique en cours...");

                const inputCapture = document.getElementById("screenshot-file");

                if (inputCapture && inputCapture.files && inputCapture.files.length > 0) {
                    dernierScreenshotBase64 = await convertirFichierImageEnBase64(inputCapture.files[0]);
                } else {
                    dernierScreenshotBase64 = capturerCanvasEnBase64();
                }

                const configuration = obtenirConfiguration();

                configuration.snapshot = configuration.snapshot || {};
                configuration.snapshot.screenshotBase64 = dernierScreenshotBase64 || null;
                configuration.screenshot_base64 = dernierScreenshotBase64 || null;

                const resultatSauvegarde = await enregistrerConfigurationSurServeur(configuration);

                afficherResultat(resultatSauvegarde);
                afficherStatus("Configuration et image enregistrées dans la liste des captures.");
                alert("✅ Configuration et image enregistrées dans la liste des captures.");

                return dernierScreenshotBase64;

            } catch (err) {
                console.error("Erreur capture :", err);
                afficherStatus("Erreur capture : " + err.message);
                alert("Erreur capture.\n\n" + err.message);
                return null;
            }
        }

        async function testerAnalyseTechnique() {
            try {
                const configuration = obtenirConfiguration();

                afficherStatus("Test technique serveur en cours...");

                const response = await fetch(getApiUrl("/api/analyse-technique-pro"), {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        actif: configuration.actif,
                        intervalle: configuration.intervalle,
                        configuration: configuration
                    })
                });

                const data = await lireReponseJson(response);

                afficherResultat(data);
                afficherStatus("Analyse technique serveur reçue.");

            } catch (err) {
                console.error("Erreur test technique :", err);
                afficherStatus("Erreur test technique : " + err.message);
                alert("Erreur test technique.\n\n" + err.message);
            }
        }

        async function analyserVisionMarche() {
            try {
                const configuration = obtenirConfiguration();

                setBoutonsActifs(false);
                afficherStatus("Analyse Vision + Marché en cours...");

                const imageBase64 = await obtenirImagePourAnalyse();

                const response = await fetch(getApiUrl("/api/analyze-vision-pro"), {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        actif: configuration.actif,
                        intervalle: configuration.intervalle,
                        imageBase64: imageBase64,
                        configuration: configuration
                    })
                });

                const data = await lireReponseJson(response);

                afficherResultat(formatterAnalyseVision(data));
                afficherStatus("Analyse Vision + Marché terminée.");
                alert("Analyse Vision + Marché terminée.");

            } catch (err) {
                console.error("Erreur Vision + Marché :", err);
                afficherStatus("Erreur Vision + Marché : " + err.message);
                alert("Erreur Vision + Marché.\n\n" + err.message);
            } finally {
                setBoutonsActifs(true);
            }
        }

        function formatterAnalyseVision(data) {
            const analyse = data.analysis || data.analyse || data;

            const lignes = [];

            lignes.push("ANALYSE VISION + MARCHÉ");
            lignes.push("=======================");
            lignes.push("");
            lignes.push("Décision : " + (analyse.decision || analyse.signal || "N/A"));
            lignes.push("Confiance : " + (analyse.confiance ?? analyse.confidence ?? "N/A") + "%");
            lignes.push("Tendance : " + (analyse.tendance || "N/A"));
            lignes.push("Actif : " + (analyse.actif || "N/A"));
            lignes.push("Intervalle : " + (analyse.intervalle || "N/A"));
            lignes.push("Prix actuel : " + (analyse.prix_actuel ?? "N/A"));
            lignes.push("Support principal : " + (analyse.support_principal ?? "N/A"));
            lignes.push("Résistance principale : " + (analyse.resistance_principale ?? "N/A"));
            lignes.push("Stop loss : " + (analyse.stop_loss ?? "N/A"));
            lignes.push("Take profit 1 : " + (analyse.take_profit_1 ?? "N/A"));
            lignes.push("Take profit 2 : " + (analyse.take_profit_2 ?? "N/A"));
            lignes.push("");

            if (analyse.resume) {
                lignes.push("Résumé :");
                lignes.push(analyse.resume);
                lignes.push("");
            }

            if (Array.isArray(analyse.raisons) && analyse.raisons.length > 0) {
                lignes.push("Raisons :");
                analyse.raisons.forEach(item => lignes.push("- " + item));
                lignes.push("");
            }

            if (Array.isArray(analyse.risques) && analyse.risques.length > 0) {
                lignes.push("Risques :");
                analyse.risques.forEach(item => lignes.push("- " + item));
                lignes.push("");
            }

            if (Array.isArray(analyse.recommandations) && analyse.recommandations.length > 0) {
                lignes.push("Recommandations :");
                analyse.recommandations.forEach(item => lignes.push("- " + item));
                lignes.push("");
            }

            lignes.push("JSON COMPLET");
            lignes.push("============");
            lignes.push(JSON.stringify(data, null, 2));

            return lignes.join("\n");
        }

        window.onload = init;

        window.onresize = () => {
            if (chart) {
                const size = getChartSize();

                chart.applyOptions({
                    width: size.width,
                    height: size.height
                });

                appliquerThemeGraphiqueTradingView();
            }
        };
		
		
	async function viderCaptures() {
    const confirmation = confirm(
        "Voulez-vous vraiment supprimer toutes les captures ?\n\nCette action est irréversible."
    );

    if (!confirmation) return;

    const motDePasse = prompt("Mot de passe administrateur :");

    if (!motDePasse || motDePasse.trim() === "") {
        alert("Suppression annulée : mot de passe absent.");
        return;
    }

    try {
        const response = await fetch("https://trading-g8ie.onrender.com/api/vider-captures", {
            method: "POST",
            mode: "cors",
            credentials: "omit",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            cache: "no-store",
            body: JSON.stringify({
                motDePasse: motDePasse.trim()
            })
        });

        const texte = await response.text();
        const resultat = JSON.parse(texte);

        if (!response.ok || resultat.ok !== true) {
            throw new Error(resultat.message || resultat.details || "Erreur inconnue.");
        }

        alert("Les captures ont été supprimées.");

        const zone = document.getElementById("resultat-analyse");
        if (zone) {
            zone.textContent = "Toutes les captures ont été supprimées.";
        }

    } catch (erreur) {
        console.error("Erreur suppression captures :", erreur);
        alert("Impossible de supprimer les captures.\n\nDétail : " + erreur.message);
    }
}
