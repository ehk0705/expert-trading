<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Trading Pro v2.0 - Full Interface</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg-color: #0b0e11; --header-bg: #1e2329; --text-main: #eaecef; --accent: #2962ff; --border: #363c4e; --yellow-pro: #f0b90b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header-pro {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--header-bg); padding: 8px 15px; border-bottom: 1px solid var(--border);
            gap: 10px;
        }

        .control-group { display: flex; align-items: center; gap: 8px; border-right: 1px solid var(--border); padding-right: 12px; }
        .control-group:last-child { border-right: none; }

        label { font-size: 11px; font-weight: bold; color: #787b86; white-space: nowrap; }
        
        h1 { 
            font-size: 16px; 
            margin: 0; 
            color: var(--yellow-pro); 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1.5px; 
            flex-grow: 1; 
            text-align: center;
            text-shadow: 0px 0px 8px rgba(240, 185, 11, 0.3);
        }
        
        select, button {
            background: #2b3139; color: #fff; border: 1px solid #474d57;
            padding: 6px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; outline: none;
        }
        
        select:hover, button:hover { background: #363c4e; }
        .btn-capture { background: var(--accent); border: none; font-weight: 600; }

        #chart-container { flex-grow: 1; width: 100%; }
        a { text-decoration: none; }
    </style>
</head>
<body>

    <div class="header-pro">
        <div class="control-group">
            <button class="btn-capture" onclick="takeScreenshot()">📷 CAPTURER SETUP</button>
        </div>

        <div class="control-group">
            <label for="asset-selector">ACTIF :</label>
            <select id="asset-selector" onchange="actualiserGraphique()">
                <option value="BINANCE:BTCUSDT">Bitcoin / USDT</option>
                <option value="COINBASE:BTCUSD">Bitcoin / USD</option>
                <option value="BINANCE:ETHUSDT">Ethereum / USDT</option>
                <option value="OANDA:XAUUSD">Or / Dollar - XAUUSD</option>
                <option value="NASDAQ:AAPL">Apple - AAPL</option>
                <option value="NASDAQ:TSLA">Tesla - TSLA</option>
                <option value="NASDAQ:NVDA">Nvidia - NVDA</option>
                <option value="NASDAQ:MSFT">Microsoft - MSFT</option>
                <option value="NASDAQ:AMZN">Amazon - AMZN</option>
                <option value="NASDAQ:GOOGL">Google - GOOGL</option>
                <option value="SP:SPX">S&P 500</option>
                <option value="TVC:DXY">Dollar Index - DXY</option>
            </select>
        </div>

        <div class="control-group">
            <label for="categorie-analyse-btc">ANALYSE :</label>
            <select id="categorie-analyse-btc">
                <option value="macroeconomie">Macroéconomie</option>
                <option value="monnaie_bitcoin">Monnaie Bitcoin</option>
                <option value="donnees_on_chain">Données on-chain</option>
                <option value="minage">Minage</option>
                <option value="analyse_technique" selected>Analyse technique</option>
                <option value="derives">Dérivés</option>
                <option value="liquidite_marche">Liquidité de marché</option>
                <option value="institutionnel">Institutionnel</option>
                <option value="sentiment">Sentiment</option>
                <option value="reglementation_risques">Réglementation et risques</option>
            </select>
        </div>

        <h1>EXPERT TRADING PRO</h1>

        <div class="control-group">
            <label for="chart-type-selector">STYLE :</label>
            <select id="chart-type-selector" onchange="changerStyleGraphique()">
                <option value="candles" selected>Bougies</option>
                <option value="bars">Barres</option>
                <option value="line">Ligne</option>
                <option value="area">Aire</option>
            </select>
        </div>

        <div class="control-group">
            <label for="interval-selector">INT :</label>
            <select id="interval-selector" onchange="actualiserGraphique()">
                <option value="1">1m</option>
                <option value="5">5m</option>
                <option value="15">15m</option>
                <option value="30">30m</option>
                <option value="60">1h</option>
                <option value="240">4h</option>
                <option value="D" selected>1J</option>
                <option value="W">1S</option>
                <option value="M">1M</option>
            </select>
        </div>

        <div>
            <a href="analyse.html"><button>ANALYSES 📊</button></a>
        </div>
    </div>

    <div id="chart-container"></div>

    <script>
        let chart, mainSeries, socket;
        let currentData = []; 

        function init() {
            chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { background: { color: '#0b0e11' }, textColor: '#848e9c' },
                grid: { vertLines: { color: '#1f2226' }, horzLines: { color: '#1f2226' } },
                timeScale: { borderVisible: false, timeVisible: true },
                crosshair: { mode: 0 }
            });

            changerStyleGraphique();
            actualiserGraphique();
        }

        function changerStyleGraphique() {
            const type = document.getElementById('chart-type-selector').value;
            if (mainSeries) chart.removeSeries(mainSeries);

            const commonOptions = {
                priceFormat: { type: 'price', precision: 2, minMove: 0.01 }
            };

            if (type === 'candles') {
                mainSeries = chart.addCandlestickSeries({
                    ...commonOptions,
                    upColor: '#2ebd85', downColor: '#f6465d', borderVisible: false,
                    wickUpColor: '#2ebd85', wickDownColor: '#f6465d'
                });
            } else if (type === 'bars') {
                mainSeries = chart.addBarSeries({ ...commonOptions, upColor: '#2ebd85', downColor: '#f6465d' });
            } else if (type === 'line') {
                mainSeries = chart.addLineSeries({ ...commonOptions, color: '#2962ff', lineWidth: 2 });
            } else if (type === 'area') {
                mainSeries = chart.addAreaSeries({ 
                    ...commonOptions, 
                    topColor: 'rgba(41, 98, 255, 0.4)', 
                    bottomColor: 'rgba(41, 98, 255, 0.0)', 
                    lineColor: '#2962ff', lineWidth: 2 
                });
            }

            if (currentData.length > 0) mainSeries.setData(currentData);
        }

        async function actualiserGraphique() {
            const rawAsset = document.getElementById('asset-selector').value;
            const symbol = rawAsset.split(':')[1] || rawAsset;
            let interval = document.getElementById('interval-selector').value;

            if(interval === "60") interval = "1h";
            else if(interval === "240") interval = "4h";
            else if(interval === "D") interval = "1d";
            else if(interval === "W") interval = "1w";
            else if(interval === "M") interval = "1M";
            else if(!isNaN(interval)) interval = interval + "m";

            if (socket) socket.close();

            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol.toUpperCase()}&interval=${interval}&limit=500`);
                const history = await res.json();
                
                currentData = history.map(d => ({
                    time: d[0] / 1000, 
                    open: parseFloat(d[1]), high: parseFloat(d[2]), 
                    low: parseFloat(d[3]), close: parseFloat(d[4]),
                    value: parseFloat(d[4]) 
                }));

                mainSeries.setData(currentData);

                socket = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@kline_${interval}`);
                socket.onmessage = (e) => {
                    const k = JSON.parse(e.data).k;
                    const update = {
                        time: k.t / 1000, 
                        open: parseFloat(k.o), high: parseFloat(k.h), 
                        low: parseFloat(k.l), close: parseFloat(k.c),
                        value: parseFloat(k.c)
                    };
                    mainSeries.update(update);
                    
                    const lastIdx = currentData.length - 1;
                    if (currentData[lastIdx] && currentData[lastIdx].time === update.time) currentData[lastIdx] = update;
                    else currentData.push(update);
                };
            } catch (err) { console.log("Erreur API/Socket"); }
        }

        async function takeScreenshot() {
            const canvas = document.querySelector('#chart-container canvas');
            const dataURL = canvas.toDataURL('image/png');
            const cat = document.getElementById('categorie-analyse-btc');
            const catText = cat.options[cat.selectedIndex].text;

            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    image: dataURL,
                    metadata: { 
                        asset: document.getElementById('asset-selector').value,
                        interval: document.getElementById('interval-selector').value,
                        category: catText,
                        style: document.getElementById('chart-type-selector').value,
                        date: new Date().toLocaleString()
                    }
                })
            });
            alert("✅ Setup " + catText + " enregistré !");
        }

        window.onload = init;
        window.onresize = () => chart.applyOptions({ width: window.innerWidth, height: window.innerHeight - 60 });
    </script>
</body>
</html>
