<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Trading - Station de Capture</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #131722; 
            color: #d1d4dc; 
            margin: 0; 
            padding: 10px;
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            box-sizing: border-box;
        }

        /* En-tête : Capture (gauche) | Titre (centre) | Analyse (droite) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
            padding: 5px 10px;
        }

        h1 { 
            margin: 0; 
            color: #2962ff; 
            font-size: 22px;
            text-align: center;
            flex: 1; /* Permet de centrer le titre par rapport aux boutons */
        }

        /* Style des boutons */
        button, .btn-secondary { 
            padding: 10px 20px; 
            font-size: 14px; 
            font-weight: bold;
            cursor: pointer; 
            border: none; 
            border-radius: 4px; 
            transition: all 0.2s ease;
            white-space: nowrap;
            text-decoration: none;
            display: inline-block;
        }

        button { background-color: #2962ff; color: white; }
        button:hover { background-color: #1e4bd8; }

        .btn-secondary { background-color: #363c4e; color: white; }
        .btn-secondary:hover { background-color: #4a5163; }

        /* Conteneur du graphique */
        #chart-container { 
            width: 100%; 
            flex-grow: 1; /* Prend tout l'espace sous l'en-tête */
            border: 1px solid #363c4e; 
            border-radius: 4px;
            background-color: #131722;
        }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="takeScreenshot()">📷 Capture le setup</button>
        
        <h1>Expert Trading v2.0</h1>
        
        <a href="analyse.html" class="btn-secondary">Voir les analyses 📊</a>
    </div>

    <div id="chart-container"></div>

    <script>
        let chart;
        let candleSeries;

        try {
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#2b2b43' }, horzLines: { color: '#2b2b43' } },
                timeScale: { timeVisible: true, secondsVisible: false }
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
                wickUpColor: '#26a69a', wickDownColor: '#ef5350'
            });

            // Génération de données factices pour le rendu
            const data = [];
            const now = new Date();
            for (let i = 30; i >= 0; i--) {
                const date = new Date();
                date.setDate(now.getDate() - i);
                data.push({
                    time: date.toISOString().split('T')[0],
                    open: 60000 + Math.random() * 2000,
                    high: 62500 + Math.random() * 2000,
                    low: 58000 + Math.random() * 2000,
                    close: 61000 + Math.random() * 2000
                });
            }

            candleSeries.setData(data);
            chart.timeScale().fitContent();
            
        } catch (error) {
            console.error("Erreur graphique :", error);
        }

        async function takeScreenshot() {
            const canvas = document.querySelector('#chart-container canvas');
            if (!canvas) return;

            const dataURL = canvas.toDataURL('image/png');

            try {
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image: dataURL,
                        metadata: { 
                            date: new Date().toLocaleString(), 
                            symbol: "BTC/USDT"
                        }
                    })
                });

                const result = await response.json();
                if (result.success) alert("✅ Capture enregistrée !");
            } catch (err) {
                alert("❌ Erreur lors de l'enregistrement.");
            }
        }

        // Gestion du redimensionnement
        window.addEventListener('resize', () => {
            const container = document.getElementById('chart-container');
            chart.applyOptions({ 
                width: container.clientWidth,
                height: container.clientHeight 
            });
        });
    </script>
</body>
</html>
