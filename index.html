<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Trading v2.0 - Interface Pro</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Trebuchet MS", Roboto, sans-serif;
            background-color: #131722; 
            color: #d1d4dc; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }

        /* BARRE D'OUTILS SUPÉRIEURE (Style TradingView) */
        .toolbar {
            display: flex;
            align-items: center;
            background-color: #1e222d;
            padding: 5px 15px;
            border-bottom: 1px solid #363c4e;
            gap: 15px;
        }

        .tool-group { display: flex; align-items: center; gap: 8px; border-right: 1px solid #363c4e; padding-right: 15px; }
        .tool-group:last-child { border-right: none; }

        h1 { font-size: 14px; color: #2962ff; margin: 0; white-space: nowrap; }

        select, button, .btn-nav {
            background: #2a2e39;
            color: #d1d4dc;
            border: 1px solid #363c4e;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        button:hover, select:hover { background: #363c4e; }
        .btn-capture { background: #2962ff; color: white; border: none; font-weight: bold; }
        .btn-capture:hover { background: #1e4bd8; }

        /* ZONE GRAPHIQUE */
        #chart-container { flex-grow: 1; width: 100%; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="tool-group">
            <button class="btn-capture" onclick="takeScreenshot()">📷 Capture le setup</button>
        </div>

        <div class="tool-group">
            <h1>EXPERT TRADING v2.0</h1>
        </div>

        <div class="tool-group">
            <select id="symbolSelect" onchange="updateSymbol()">
                <option value="BTCUSDT">BTC/USDT</option>
                <option value="ETHUSDT">ETH/USDT</option>
                <option value="SOLUSDT">SOL/USDT</option>
            </select>
            <select>
                <option>1H</option>
                <option>4H</option>
                <option selected>D</option>
            </select>
        </div>

        <div class="tool-group">
            <button onclick="toggleEMA()">📈 Indicateurs (EMA)</button>
        </div>

        <div style="margin-left: auto;">
            <a href="analyse.html" style="text-decoration:none;"><button class="btn-nav">Voir les analyses 📊</button></a>
        </div>
    </div>

    <div id="chart-container"></div>

    <script>
        let chart, candleSeries, emaSeries, volumeSeries;
        let showEMA = true;

        function initChart() {
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#2b2b43' }, horzLines: { color: '#2b2b43' } },
                timeScale: { borderVisible: false },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#089981', downColor: '#f23645', borderVisible: false,
                wickUpColor: '#089981', wickDownColor: '#f23645'
            });

            emaSeries = chart.addLineSeries({ color: '#2962ff', lineWidth: 2, title: 'EMA 20' });
            
            volumeSeries = chart.addHistogramSeries({
                color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: ''
            });
            chart.priceScale('').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });

            generateData();
        }

        function generateData() {
            const data = [], volData = [], emaData = [];
            let price = 60000;
            for (let i = 200; i >= 0; i--) {
                const time = new Date(Date.now() - i * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                const open = price;
                const close = open + (Math.random() - 0.5) * 1000;
                data.push({ time, open, high: Math.max(open, close) + 200, low: Math.min(open, close) - 200, close });
                volData.push({ time, value: Math.random() * 100, color: close > open ? '#08998155' : '#f2364555' });
                emaData.push({ time, value: open - 100 });
                price = close;
            }
            candleSeries.setData(data);
            volumeSeries.setData(volData);
            emaSeries.setData(emaData);
            chart.timeScale().fitContent();
        }

        function toggleEMA() {
            showEMA = !showEMA;
            emaSeries.applyOptions({ visible: showEMA });
        }

        async function takeScreenshot() {
            const canvas = document.querySelector('#chart-container canvas');
            const dataURL = canvas.toDataURL('image/png');
            const res = await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataURL, metadata: { symbol: document.getElementById('symbolSelect').value } })
            });
            if (res.ok) alert("✅ Setup capturé !");
        }

        window.onload = initChart;
        window.onresize = () => chart.applyOptions({ width: innerWidth, height: innerHeight - 50 });
    </script>
</body>
</html>
