<script>
    console.log("Initialisation du graphique dynamique...");
    
    try {
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2b2b43' }, horzLines: { color: '#2b2b43' } },
            timeScale: { timeVisible: true, secondsVisible: false }
        });
        
        const candleSeries = chart.addCandlestickSeries();
        
        // Génération de données basées sur la date actuelle pour assurer la visibilité
        const now = new Date();
        const data = [];
        for (let i = 20; i >= 0; i--) {
            const d = new Date();
            d.setDate(now.getDate() - i);
            data.push({
                time: d.toISOString().split('T')[0],
                open: 60000 + Math.random() * 1000,
                high: 61500 + Math.random() * 1000,
                low: 59000 + Math.random() * 1000,
                close: 60500 + Math.random() * 1000
            });
        }
        
        candleSeries.setData(data);
        chart.timeScale().fitContent(); // Force le zoom sur les données
        
        console.log("Données injectées avec succès.");

    } catch (e) {
        console.error("Erreur technique :", e);
    }

    async function takeScreenshot() {
        // On récupère le premier canvas généré par la bibliothèque
        const canvas = document.querySelector('#chart-container canvas');
        if (!canvas) {
            alert("Erreur : Canvas introuvable");
            return;
        }
        
        const dataURL = canvas.toDataURL('image/png');
        
        try {
            const response = await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    image: dataURL,
                    metadata: { 
                        date: new Date().toLocaleString(), 
                        strategy: "Test Backtest",
                        symbol: "BTC/USDT"
                    }
                })
            });
            const result = await response.json();
            if(result.success) alert("📷 Capture réussie et enregistrée sur Render !");
        } catch (err) {
            console.error("Erreur upload:", err);
            alert("Erreur de communication avec le serveur.");
        }
    }
</script>
