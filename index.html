<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Trading Pro v2.0 - Full Interface</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        :root {
            --page-bg: #e2e8f0;
            --header-bg: #ffffff;
            --toolbar-bg: #f8fafc;
            --chart-bg: #ffffff;
            --chart-grid: #cbd5e1;
            --chart-text: #111827;
            --text-main: #111827;
            --text-muted: #475569;
            --accent: #2563eb;
            --border: #94a3b8;
            --yellow-pro: #b77900;
            --buy-green: #16a085;
            --sell-red: #e74c3c;
            --purple-pro: #7c3aed;
            --shadow-soft: 0 8px 22px rgba(15, 23, 42, 0.12);
            --shadow-strong: 0 18px 45px rgba(15, 23, 42, 0.20);
        }

        * { box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }

        body {
            font-family: Inter, Arial, sans-serif;
            background: var(--page-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header-pro {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--header-bg);
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            gap: 8px;
            flex-wrap: wrap;
            z-index: 10;
            flex-shrink: 0;
            box-shadow: var(--shadow-soft);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: var(--toolbar-bg);
        }

        label {
            font-size: 10px;
            font-weight: 900;
            color: var(--text-muted);
            white-space: nowrap;
            letter-spacing: 0.04em;
        }

        h1 {
            font-size: 15px;
            margin: 0;
            color: #111827;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            flex-grow: 1;
            text-align: center;
            min-width: 160px;
        }

        select, button, input[type="file"] {
            background: #ffffff;
            color: #111827;
            border: 1px solid #cbd5e1;
            padding: 7px 10px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            outline: none;
            transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
        }

        select { min-width: 82px; }
        input[type="file"] { max-width: 185px; background: #ffffff; }

        select:hover, button:hover, input[type="file"]:hover {
            background: #f1f5f9;
            border-color: #2563eb;
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .btn-capture { background: #2563eb; color: white; font-weight: 900; }
        .btn-vision { background: #7c3aed; color: white; font-weight: 900; }
        .btn-technique { background: #16a085; color: white; font-weight: 900; }
        .btn-effacer { background: #e74c3c; color: white; font-weight: 900; }

        #chart-container {
            flex: 1 1 auto;
            width: calc(100% - 24px);
            height: calc(100vh - 76px);
            min-height: 520px;
            margin: 12px;
            background: var(--chart-bg);
            position: relative;
            border: 2px solid #94a3b8;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: var(--shadow-strong);
        }

        #chart-container canvas {
            background: var(--chart-bg) !important;
            display: block !important;
        }

        .result-panel {
            position: fixed;
            right: 18px;
            bottom: 18px;
            width: min(640px, calc(100vw - 36px));
            max-height: 40vh;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            box-shadow: var(--shadow-strong);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 20;
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: #f1f5f9;
            border-bottom: 1px solid #cbd5e1;
        }

        .status-line {
            color: var(--text-muted);
            font-size: 11px;
            padding: 8px 12px;
            border-bottom: 1px solid #cbd5e1;
            white-space: pre-wrap;
        }

        #resultat-analyse {
            margin: 0;
            padding: 12px;
            color: #111827;
            font-family: Consolas, monospace;
            font-size: 11px;
            line-height: 1.5;
            overflow: auto;
            white-space: pre-wrap;
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            body { height: auto; overflow: auto; }
            .header-pro { align-items: stretch; }
            .control-group { width: 100%; justify-content: space-between; }
            h1 { width: 100%; order: -1; }
            #chart-container { height: 55vh; }
            .result-panel { position: static; width: calc(100% - 20px); margin: 10px; }
        }
    </style>
</head>
<body>

    <div class="header-pro">
        <div class="control-group">
            <button class="btn-capture" id="btn-capture" onclick="takeScreenshot()">📷 CAPTURE</button>
            <input type="file" id="screenshot-file" accept="image/png,image/jpeg,image/webp">
            <button class="btn-vision" id="btn-vision" onclick="analyserVisionMarche()">Vision + Marché</button>
        </div>

        <div class="control-group">
            <label for="asset-selector">ACTIF :</label>
            <select id="asset-selector" onchange="actualiserGraphique()">
                <option value="BINANCE:BTCUSDT">BTC/USDT</option>
                <option value="BINANCE:ETHUSDT">ETH/USDT</option>
                <option value="BINANCE:SOLUSDT">SOL/USDT</option>
                <option value="BINANCE:BNBUSDT">BNB/USDT</option>
                <option value="BINANCE:XRPUSDT">XRP/USDT</option>
                <option value="OANDA:XAUUSD">OR (XAU)</option>
                <option value="NASDAQ:AAPL">AAPL</option>
                <option value="NASDAQ:TSLA">TSLA</option>
                <option value="NASDAQ:NVDA">NVDA</option>
            </select>
        </div>

        <div class="control-group">
            <label for="categorie-analyse-btc">ANALYSE :</label>
            <select id="categorie-analyse-btc">
                <option value="macro">Macro</option>
                <option value="technique" selected>Technique</option>
                <option value="derives">Dérivés</option>
                <option value="sentiment">Sentiment</option>
            </select>
        </div>

        <h1>EXPERT TRADING PRO</h1>

        <div class="control-group">
            <label for="chart-type-selector">STYLE :</label>
            <select id="chart-type-selector" onchange="changerStyleGraphique()">
                <option value="candles" selected>Bougies</option>
                <option value="bars">Barres</option>
                <option value="line">Ligne</option>
                <option value="area">Aire</option>
            </select>
        </div>

        <div class="control-group">
            <label for="indicator-selector">IND :</label>
            <select id="indicator-selector" onchange="calculerEtAfficherIndicateur()">
                <option value="NONE" selected>Aucun</option>
                <option value="EMA">EMA (20/50)</option>
                <option value="RSI">RSI (14)</option>
                <option value="MACD">MACD</option>
                <option value="SUPERTREND">SuperTrend</option>
                <option value="BOLLINGER">Bandes Bollinger</option>
                <option value="ATR">ATR</option>
                <option value="VOLUME">Volume</option>
            </select>
        </div>

        <div class="control-group">
            <label for="interval-selector">INT :</label>
            <select id="interval-selector" onchange="actualiserGraphique()">
                <option value="1">1m</option>
                <option value="5">5m</option>
                <option value="15">15m</option>
                <option value="60">1h</option>
                <option value="240">4h</option>
                <option value="D" selected>1J</option>
                <option value="W">1S</option>
            </select>
        </div>

        <div class="control-group">
            <button class="btn-technique" onclick="testerAnalyseTechniqueLocal()">Calculer Technique Local</button>
            <button class="btn-effacer" onclick="effacerResultat()">Effacer</button>
        </div>
    </div>

    <div id="chart-container"></div>

    <div class="result-panel" id="result-panel">
        <div class="result-header">
            <strong>Système d'Analyse Algorithmique & Vision</strong>
            <button type="button" onclick="togglePanel()">Masquer / Afficher</button>
        </div>
        <div id="status" class="status-line">Prêt.</div>
        <pre id="resultat-analyse">Aucune analyse lancée.</pre>
    </div>

    <script>
        /* CONFIGURATION ET VARIABLES GLOBAL */
        const API_BASE_URL = window.location.hostname.includes("github.io") ? "https://expert-trading.onrender.com" : "";
        let chart, mainSeries, socket;
        let extraSeries = [];
        let currentData = [];
        let dernierScreenshotBase64 = null;

        function getApiUrl(route) { return API_BASE_URL + route; }

        function getChartSize() {
            const container = document.getElementById('chart-container');
            const rect = container.getBoundingClientRect();
            return {
                width: Math.max(320, Math.floor(rect.width || window.innerWidth)),
                height: Math.max(520, Math.floor(rect.height || window.innerHeight - 80))
            };
        }

        function init() {
            const container = document.getElementById('chart-container');
            const size = getChartSize();

            chart = LightweightCharts.createChart(container, {
                width: size.width,
                height: size.height,
                layout: { background: { type: 'solid', color: '#ffffff' }, textColor: '#1f2937' },
                grid: { vertLines: { color: '#d9dee8' }, horzLines: { color: '#d9dee8' } },
                rightPriceScale: { borderColor: '#cbd5e1' },
                timeScale: { borderColor: '#cbd5e1', timeVisible: true, borderVisible: true },
                crosshair: { mode: 0 }
            });

            changerStyleGraphique();
            actualiserGraphique();
        }

        /* LOGIQUE DE SÉLECTION DU STYLE DE GRAPHIQUE */
        function changerStyleGraphique() {
            const type = document.getElementById('chart-type-selector').value;
            if (mainSeries) { chart.removeSeries(mainSeries); mainSeries = null; }

            const config = { priceFormat: { type: 'price', precision: 2, minMove: 0.01 } };

            if (type === 'candles') {
                mainSeries = chart.addCandlestickSeries({ ...config, upColor: '#16a085', downColor: '#e74c3c', wickUpColor: '#16a085', wickDownColor: '#e74c3c', borderVisible: false });
            } else if (type === 'bars') {
                mainSeries = chart.addBarSeries({ ...config, upColor: '#16a085', downColor: '#e74c3c' });
            } else if (type === 'line') {
                mainSeries = chart.addLineSeries({ ...config, color: '#2563eb', lineWidth: 2 });
            } else if (type === 'area') {
                mainSeries = chart.addAreaSeries({ ...config, topColor: 'rgba(37, 99, 235, 0.2)', bottomColor: 'rgba(255, 255, 255, 1)', lineColor: '#2563eb', lineWidth: 2 });
            }

            if (currentData.length > 0) mainSeries.setData(currentData);
            nettoyerIndicateursSecondaires();
        }

        /* LIEN BINANCE DIRECT (REST + WEBSOCKET) */
        async function actualiserGraphique() {
            const rawAsset = document.getElementById('asset-selector').value;
            if (!rawAsset.startsWith("BINANCE:")) {
                afficherStatus("Données locales simulées pour actifs hors-Binance.");
                genererDonneesSimulees();
                return;
            }

            const symbol = rawAsset.split(":")[1];
            const intervalInput = document.getElementById('interval-selector').value;
            const interval = conversionIntervalleBinance(intervalInput);

            if (socket) { socket.close(); socket = null; }

            try {
                afficherStatus("Connexion API Binance...");
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=1000`);
                const history = await res.json();

                currentData = history.map(d => ({
                    time: d[0] / 1000,
                    open: parseFloat(d[1]),
                    high: parseFloat(d[2]),
                    low: parseFloat(d[3]),
                    close: parseFloat(d[4]),
                    value: parseFloat(d[4]),
                    volume: parseFloat(d[5])
                }));

                mainSeries.setData(currentData);
                chart.timeScale().fitContent();
                afficherStatus(`Flux en temps réel connecté : ${symbol} (${interval})`);

                socket = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@kline_${interval}`);
                socket.onmessage = (e) => {
                    const k = JSON.parse(e.data).k;
                    const update = {
                        time: k.t / 1000, open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: parseFloat(k.c), value: parseFloat(k.c), volume: parseFloat(k.v)
                    };
                    mainSeries.update(update);
                    
                    const lastIdx = currentData.length - 1;
                    if (currentData[lastIdx] && currentData[lastIdx].time === update.time) {
                        currentData[lastIdx] = update;
                    } else {
                        currentData.push(update);
                    }
                };
            } catch (err) {
                afficherStatus("Erreur de chargement réseau. Bascule simulation.");
                genererDonneesSimulees();
            }
        }

        function conversionIntervalleBinance(val) {
            if (val === "60") return "1h";
            if (val === "240") return "4h";
            if (val === "D") return "1d";
            if (val === "W") return "1w";
            return val + "m";
        }

        function genererDonneesSimulees() {
            let basePrice = 100;
            let time = Math.floor(Date.now() / 1000) - 500 * 86400;
            currentData = [];
            for (let i = 0; i < 500; i++) {
                let open = basePrice + (Math.random() - 0.5) * 4;
                let close = open + (Math.random() - 0.5) * 4;
                let high = Math.max(open, close) + Math.random() * 2;
                let low = Math.min(open, close) - Math.random() * 2;
                currentData.push({ time: time, open, high, low, close, value: close, volume: Math.random() * 1000 });
                time += 86400;
                basePrice = close;
            }
            mainSeries.setData(currentData);
            chart.timeScale().fitContent();
        }

        /* ENGINE MATHEMATIQUE : CALCUL DES INDICATEURS TECHNIQUE LOCAUX */
        function nettoyerIndicateursSecondaires() {
            extraSeries.forEach(s => { try { chart.removeSeries(s); } catch(e){} });
            extraSeries = [];
        }

        function calculerEtAfficherIndicateur() {
            nettoyerIndicateursSecondaires();
            const ind = document.getElementById('indicator-selector').value;
            if (currentData.length === 0) return;

            if (ind === "EMA") {
                const ema20 = calculerEMA(currentData, 20);
                const ema50 = calculerEMA(currentData, 50);
                
                const s1 = chart.addLineSeries({ color: '#e67e22', lineWidth: 1.5, title: 'EMA 20' });
                const s2 = chart.addLineSeries({ color: '#2980b9', lineWidth: 1.5, title: 'EMA 50' });
                
                s1.setData(ema20);
                s2.setData(ema50);
                extraSeries.push(s1, s2);
            } 
            else if (ind === "RSI") {
                const rsi = calculerRSI(currentData, 14);
                const s = chart.addLineSeries({ color: '#9b59b6', lineWidth: 2, title: 'RSI (14)' });
                s.setData(rsi);
                extraSeries.push(s);
            } 
            else if (ind === "BOLLINGER") {
                const bb = calculerBandesBollinger(currentData, 20, 2);
                const sup = chart.addLineSeries({ color: '#2ecc71', lineWidth: 1, lineStyle: 1, title: 'BB Sup' });
                const milieu = chart.addLineSeries({ color: '#7f8c8d', lineWidth: 1, title: 'BB Base' });
                const inf = chart.addLineSeries({ color: '#e74c3c', lineWidth: 1, lineStyle: 1, title: 'BB Inf' });
                
                sup.setData(bb.upper);
                milieu.setData(bb.basis);
                inf.setData(bb.lower);
                extraSeries.push(sup, milieu, inf);
            } 
            else if (ind === "VOLUME") {
                const vSeries = chart.addHistogramSeries({
                    color: '#bdc3c7', priceFormat: { type: 'volume' }, priceScaleId: 'volume-scale'
                });
                chart.priceScale('volume-scale').applyOptions({ scaleMargins: { top: 0.7, bottom: 0 } });
                const vData = currentData.map(d => ({
                    time: d.time, value: d.volume, color: d.close >= d.open ? 'rgba(22, 160, 133, 0.4)' : 'rgba(231, 76, 60, 0.4)'
                }));
                vSeries.setData(vData);
                extraSeries.push(vSeries);
            }
            else if (ind === "MACD") {
                const macdData = calculerMACD(currentData, 12, 26, 9);
                const line = chart.addLineSeries({ color: '#2980b9', lineWidth: 1.5, title: 'MACD' });
                const signal = chart.addLineSeries({ color: '#e67e22', lineWidth: 1.5, title: 'Signal' });
                line.setData(macdData.macd);
                signal.setData(macdData.signal);
                extraSeries.push(line, signal);
            }
            else if (ind === "SUPERTREND") {
                const stData = calculerSuperTrend(currentData, 10, 3);
                const stLine = chart.addLineSeries({ lineWidth: 2, title: 'SuperTrend' });
                stLine.setData(stData.map(d => ({ time: d.time, value: d.value, color: d.trend === 'up' ? '#2ecc71' : '#e74c3c' })));
                extraSeries.push(stLine);
            }
            else if (ind === "ATR") {
                const atrData = calculerATR(currentData, 14);
                const atrLine = chart.addLineSeries({ color: '#e74c3c', lineWidth: 1.5, title: 'ATR (14)' });
                atrLine.setData(atrData);
                extraSeries.push(atrLine);
            }
        }

        /* MODULES DE CALCUL MATHÉMATIQUES */
        function calculerEMA(data, periode) {
            let k = 2 / (periode + 1);
            let emaData = [];
            let valeurEma = data[0].close;
            
            for (let i = 0; i < data.length; i++) {
                valeurEma = data[i].close * k + valeurEma * (1 - k);
                if (i >= periode) {
                    emaData.push({ time: data[i].time, value: valeurEma });
                }
            }
            return emaData;
        }

        function calculerRSI(data, periode) {
            let rsiData = [];
            let hausses = 0, baisses = 0;

            for (let i = 1; i <= periode; i++) {
                let diff = data[i].close - data[i - 1].close;
                if (diff > 0) hausses += diff; else baisses -= diff;
            }

            let moyHausse = hausses / periode;
            let moyBaisse = baisses / periode;
            
            for (let i = periode + 1; i < data.length; i++) {
                let diff = data[i].close - data[i - 1].close;
                moyHausse = ((moyHausse * (periode - 1)) + (diff > 0 ? diff : 0)) / periode;
                moyBaisse = ((moyBaisse * (periode - 1)) + (diff < 0 ? -diff : 0)) / periode;

                let rs = moyBaisse === 0 ? 100 : moyHausse / moyBaisse;
                rsiData.push({ time: data[i].time, value: 100 - (100 / (1 + rs)) });
            }
            return rsiData;
        }

        function calculerBandesBollinger(data, periode, multiplicateur) {
            let basis = [], upper = [], lower = [];

            for (let i = periode - 1; i < data.length; i++) {
                let tranche = data.slice(i - periode + 1, i + 1);
                let somme = tranche.reduce((acc, d) => acc + d.close, 0);
                let moyenne = somme / periode;

                let sommeCarres = tranche.reduce((acc, d) => acc + Math.pow(d.close - moyenne, 2), 0);
                let ecartType = Math.sqrt(sommeCarres / periode);

                basis.push({ time: data[i].time, value: moyenne });
                upper.push({ time: data[i].time, value: moyenne + multiplicateur * ecartType });
                lower.push({ time: data[i].time, value: moyenne - multiplicateur * ecartType });
            }
            return { basis, upper, lower };
        }

        function calculerATR(data, periode) {
            let atrData = [];
            let trs = [];

            for (let i = 1; i < data.length; i++) {
                let h_l = data[i].high - data[i].low;
                let h_pc = Math.abs(data[i].high - data[i - 1].close);
                let l_pc = Math.abs(data[i].low - data[i - 1].close);
                trs.push(Math.max(h_l, h_pc, l_pc));
            }

            let sommeAtr = trs.slice(0, periode).reduce((a, b) => a + b, 0) / periode;
            atrData.push({ time: data[periode].time, value: sommeAtr });

            for (let i = periode + 1; i < data.length - 1; i++) {
                sommeAtr = (sommeAtr * (periode - 1) + trs[i - 1]) / periode;
                atrData.push({ time: data[i].time, value: sommeAtr });
            }
            return atrData;
        }

        function calculerMACD(data, rapide, lente, signalPeriode) {
            let emaRapide = calculerEMA(data, rapide);
            let emaLente = calculerEMA(data, lente);
            let macdLine = [];

            let dictLente = {};
            emaLente.forEach(d => dictLente[d.time] = d.value);

            emaRapide.forEach(r => {
                if (dictLente[r.time]) {
                    macdLine.push({ time: r.time, value: r.value - dictLente[r.time] });
                }
            });

            let signalLine = calculerEMA(macdLine.map(m => ({ ...m, close: m.value })), signalPeriode);
            return { macd: macdLine, signal: signalLine };
        }

        function calculerSuperTrend(data, periode, mult) {
            let atr = calculerATR(data, periode);
            let dictAtr = {};
            atr.forEach(a => dictAtr[a.time] = a.value);

            let stData = [];
            let prevClose = data[0].close;
            let trend = 'up';
            let prevLowerBand = 0, prevUpperBand = 0;

            for (let i = 1; i < data.length; i++) {
                let t = data[i].time;
                let valAtr = dictAtr[t] || (data[i].high - data[i].low);
                let mid = (data[i].high + data[i].low) / 2;

                let basicUpper = mid + mult * valAtr;
                let basicLower = mid - mult * valAtr;

                let upperBand = (basicUpper < prevUpperBand || data[i - 1].close > prevUpperBand) ? basicUpper : prevUpperBand;
                let lowerBand = (basicLower > prevLowerBand || data[i - 1].close < prevLowerBand) ? basicLower : prevLowerBand;

                if (trend === 'up' && data[i].close < lowerBand) trend = 'down';
                else if (trend === 'down' && data[i].close > upperBand) trend = 'up';

                let value = (trend === 'up') ? lowerBand : upperBand;
                stData.push({ time: t, value: value, trend: trend });

                prevUpperBand = upperBand;
                prevLowerBand = lowerBand;
            }
            return stData;
        }

        /* CRÉATION DE RAPPORT DE TRADING LOCAL DIRECT (MOTEUR QUANTITATIF) */
        function testerAnalyseTechniqueLocal() {
            if (currentData.length < 50) {
                alert("Données insuffisantes pour faire tourner le moteur quantitatif.");
                return;
            }

            afficherStatus("Analyse quantitative de l'algorithme en cours...");
            const fin = currentData[currentData.length - 1];
            const prec = currentData[currentData.length - 2];

            // Calculs express
            const ema20 = calculerEMA(currentData, 20).pop().value;
            const ema50 = calculerEMA(currentData, 50).pop().value;
            const rsi = calculerRSI(currentData, 14).pop().value;
            
            let tendance = fin.close > ema50 ? "BULLISH (Haussière)" : "BEARISH (Baisse)";
            let signal = "NEUTRE";
            let motifs = [];

            if (fin.close > ema20 && prec.close <= ema20) motifs.push("Cassure haussière de la EMA20");
            if (rsi < 30) { signal = "ACHAT PROCHE"; motifs.push("Zone de survente RSI (Sous 30)"); }
            if (rsi > 70) { signal = "VENTE PROCHE"; motifs.push("Zone de surachat RSI (Plus de 70)"); }
            if (fin.close > ema20 && ema20 > ema50) { signal = "ACHAT FORT (TREND ACCOMPAGNÉ)"; }

            const rapport = {
                statut: "SUCCÈS",
                timestamp: new Date().toLocaleString(),
                analyse_locale: {
                    actif: document.getElementById('asset-selector').value,
                    prix_cloture: fin.close,
                    tendance_globale: tendance,
                    RSI_14: rsi.toFixed(2),
                    EMA_20: ema20.toFixed(2),
                    EMA_50: ema50.toFixed(2),
                    signal_declenche: signal,
                    elements_techniques: motifs.length > 0 ? motifs : ["Aucun signal d'impulsion brusque détecté"]
                }
            };

            afficherResultat(rapport);
            afficherStatus("Rapport algorithmique local généré.");
        }

        /* CAPTURE ET ENVOI DE VISION VERS LE SERVEUR RENDER / COMPTE OPENAI */
        function capturerCanvasEnBase64() {
            const canvas = document.querySelector('#chart-container canvas');
            if (!canvas) throw new Error("Canvas introuvable.");
            return canvas.toDataURL('image/png');
        }

        async function obtenirImagePourAnalyse() {
            const input = document.getElementById("screenshot-file");
            if (input && input.files && input.files.length > 0) {
                return await new Promise((resolve) => {
                    const r = new FileReader();
                    r.onload = () => resolve(r.result);
                    r.readAsDataURL(input.files[0]);
                });
            }
            return dernierScreenshotBase64 || capturerCanvasEnBase64();
        }

        async function takeScreenshot() {
            try {
                afficherStatus("Génération de la capture écran...");
                const base64 = capturerCanvasEnBase64();
                dernierScreenshotBase64 = base64;

                const payload = {
                    image: base64,
                    metadata: { asset: document.getElementById('asset-selector').value, date: new Date().toLocaleString() }
                };

                afficherStatus("Envoi et sauvegarde de l'image sur le stockage distant...");
                const response = await fetch(getApiUrl('/api/save'), {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });

                if (response.ok) {
                    afficherStatus("Capture sauvegardée sur le cloud de production.");
                    alert("✅ Capture réussie et synchronisée.");
                } else {
                    throw new Error("Erreur serveur HTTP " + response.status);
                }
            } catch (err) {
                afficherStatus("Sauvegarde distante impossible. Image disponible en cache mémoire local.");
                alert("⚠️ Capture conservée localement (Serveur distant déconnecté).");
            }
        }

        async function analyserVisionMarche() {
            try {
                if (currentData.length === 0) return;
                afficherStatus("Préparation de l'image et injection dans l'API GPT-Vision...");
                
                const img = await obtenirImagePourAnalyse();
                
                const response = await fetch(getApiUrl('/api/analyze-vision-pro'), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        actif: document.getElementById('asset-selector').value,
                        intervalle: document.getElementById('interval-selector').value,
                        imageBase64: img
                    })
                });

                const txt = await response.text();
                try {
                    const json = JSON.parse(txt);
                    afficherResultat(json);
                } catch(e) {
                    afficherResultat(txt);
                }
                afficherStatus("Analyse Vision multicritère complétée.");
            } catch(e) {
                afficherStatus("Erreur d'appel API Vision : " + e.message);
            }
        }

        /* OUTILS D'INTERFACE */
        function afficherStatus(m) { document.getElementById("status").textContent = m; }
        function afficherResultat(d) {
            document.getElementById("resultat-analyse").textContent = typeof d === "string" ? d : JSON.stringify(d, null, 2);
        }
        function togglePanel() {
            document.getElementById("resultat-analyse").classList.toggle("hidden");
            document.getElementById("status").classList.toggle("hidden");
        }
        function effacerResultat() {
            afficherResultat("Aucune analyse lancée.");
            afficherStatus("Prêt.");
        }

        window.onload = init;
        window.onresize = () => { if (chart) { const s = getChartSize(); chart.applyOptions({ width: s.width, height: s.height }); } };
    </script>
</body>
</html>
