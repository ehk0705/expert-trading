<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Trading Pro v2.0 - Full Interface</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg-color: #0b0e11; --header-bg: #1e2329; --text-main: #eaecef; --accent: #2962ff; --border: #363c4e; --yellow-pro: #f0b90b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header-pro {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--header-bg); padding: 8px 15px; border-bottom: 1px solid var(--border);
            gap: 10px;
        }

        .control-group { display: flex; align-items: center; gap: 8px; border-right: 1px solid var(--border); padding-right: 12px; }
        .control-group:last-child { border-right: none; }

        label { font-size: 11px; font-weight: bold; color: #787b86; white-space: nowrap; }
        
        /* Titre en JAUNE et GRAS */
        h1 { 
            font-size: 16px; 
            margin: 0; 
            color: var(--yellow-pro); 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1.5px; 
            flex-grow: 1; 
            text-align: center;
            text-shadow: 0px 0px 8px rgba(240, 185, 11, 0.3);
        }
        
        select, button {
            background: #2b3139; color: #fff; border: 1px solid #474d57;
            padding: 6px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; outline: none;
        }
        
        select:hover, button:hover { background: #363c4e; }
        .btn-capture { background: var(--accent); border: none; font-weight: 600; }

        #chart-container { flex-grow: 1; width: 100%; }
        a { text-decoration: none; }
    </style>
</head>
<body>

    <div class="header-pro">
        <div class="control-group">
            <button class="btn-capture" onclick="takeScreenshot()">📷 CAPTURER SETUP</button>
        </div>

        <div class="control-group">
            <label for="asset-selector">ACTIF :</label>
            <select id="asset-selector" onchange="actualiserGraphique()">
                <option value="BINANCE:BTCUSDT">Bitcoin / USDT</option>
                <option value="COINBASE:BTCUSD">Bitcoin / USD</option>
                <option value="BINANCE:ETHUSDT">Ethereum / USDT</option>
                <option value="OANDA:XAUUSD">Or / Dollar - XAUUSD</option>
                <option value="NASDAQ:AAPL">Apple - AAPL</option>
                <option value="NASDAQ:TSLA">Tesla - TSLA</option>
                <option value="NASDAQ:NVDA">Nvidia - NVDA</option>
                <option value="NASDAQ:MSFT">Microsoft - MSFT</option>
                <option value="NASDAQ:AMZN">Amazon - AMZN</option>
                <option value="NASDAQ:GOOGL">Google - GOOGL</option>
                <option value="SP:SPX">S&amp;P 500</option>
                <option value="TVC:DXY">Dollar Index - DXY</option>
            </select>
        </div>

        <h1>EXPERT TRADING PRO</h1>

        <div class="control-group">
            <label for="interval-selector">INTERVALLE :</label>
            <select id="interval-selector" onchange="actualiserGraphique()">
                <option value="1">1 minute</option>
                <option value="5">5 minutes</option>
                <option value="15">15 minutes</option>
                <option value="30">30 minutes</option>
                <option value="60">1 heure</option>
                <option value="240">4 heures</option>
                <option value="D" selected>1 jour</option>
                <option value="W">1 semaine</option>
                <option value="M">1 mois</option>
            </select>
        </div>

        <div class="control-group">
            <label for="indicator-selector">INDICATEUR :</label>
            <select id="indicator-selector" onchange="actualiserGraphique()">
                <option value="EMA">EMA</option>
                <option value="RSI">RSI</option>
                <option value="MACD">MACD</option>
                <option value="SUPERTREND">Supertrend</option>
                <option value="BOLLINGER">Bandes de Bollinger</option>
                <option value="ATR">ATR</option>
                <option value="VOLUME">Volume</option>
                <option value="LIQUIDITY_ZONE">Zones de liquidité</option>
            </select>
        </div>

        <div>
            <a href="analyse.html"><button>ANALYSES 📊</button></a>
        </div>
    </div>

    <div id="chart-container"></div>

    <script>
        let chart, candleSeries, socket;

        function init() {
            chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { background: { color: '#0b0e11' }, textColor: '#848e9c' },
                grid: { vertLines: { color: '#1f2226' }, horzLines: { color: '#1f2226' } },
                timeScale: { borderVisible: false, timeVisible: true },
                crosshair: { mode: 0 }
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#2ebd85', downColor: '#f6465d', borderVisible: false,
                wickUpColor: '#2ebd85', wickDownColor: '#f6465d'
            });

            actualiserGraphique();
        }

        async function actualiserGraphique() {
            const rawAsset = document.getElementById('asset-selector').value;
            const symbol = rawAsset.split(':')[1] || rawAsset;
            let interval = document.getElementById('interval-selector').value;

            if(interval === "60") interval = "1h";
            if(interval === "240") interval = "4h";
            if(interval === "D") interval = "1d";
            if(interval === "W") interval = "1w";
            if(interval === "M") interval = "1M";
            else if(!isNaN(interval)) interval = interval + "m";

            if (socket) socket.close();

            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol.toUpperCase()}&interval=${interval}&limit=500`);
                const history = await res.json();
                candleSeries.setData(history.map(d => ({
                    time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4])
                })));

                socket = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@kline_${interval}`);
                socket.onmessage = (e) => {
                    const k = JSON.parse(e.data).k;
                    candleSeries.update({
                        time: k.t / 1000, open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: parseFloat(k.c)
                    });
                };
            } catch (err) {
                console.log("Flux live indisponible pour cet actif sur Binance.");
            }
        }

        async function takeScreenshot() {
            const canvas = document.querySelector('#chart-container canvas');
            const dataURL = canvas.toDataURL('image/png');
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    image: dataURL,
                    metadata: { 
                        asset: document.getElementById('asset-selector').value,
                        interval: document.getElementById('interval-selector').value,
                        date: new Date().toLocaleString()
                    }
                })
            });
            alert("✅ Capture enregistrée !");
        }

        window.onload = init;
        window.onresize = () => chart.applyOptions({ width: innerWidth, height: innerHeight - 60 });
    </script>
</body>
</html>
