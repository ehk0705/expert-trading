<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Trading Pro v2.0 - Analyse & Journal</title>
    <style>
        :root { 
            --bg-color: #252930; 
            --sidebar-bg: #1e2329; 
            --text-main: #eaecef; 
            --text-dim: #848e9c;
            --accent: #2962ff; 
            --yellow-pro: #f0b90b;
            --border: #363c4e; 
            --engineer-green: #00ff41;
            --buy-green: #2ebd85;
            --sell-red: #f6465d;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; height: 100vh; margin: 0; 
            background: var(--bg-color); color: var(--text-main); overflow: hidden;
        }

        .sidebar { width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--sidebar-bg); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { margin: 0; color: var(--yellow-pro); font-size: 16px; font-weight: 800; text-transform: uppercase; }
        #gallery-list { flex-grow: 1; overflow-y: auto; padding: 15px; }

        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; align-items: center; }

        .thumb-container { margin-bottom: 15px; cursor: pointer; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: 0.2s; background: #161a1e; }
        .thumb-container:hover { border-color: var(--accent); }
        .thumb-container.active { border-color: var(--yellow-pro); box-shadow: 0 0 10px rgba(240, 185, 11, 0.2); }
        .thumb-container img { width: 100%; display: block; height: auto; opacity: 0.7; }
        .thumb-container.active img { opacity: 1; }
        .thumb-label { padding: 8px; font-size: 10px; text-align: center; color: var(--text-dim); }

        #viewer { max-width: 100%; max-height: 50vh; border-radius: 4px; border: 1px solid var(--border); box-shadow: 0 15px 40px rgba(0,0,0,0.6); display: none; margin-bottom: 20px; }

        .info-panel { background: #ffffff; padding: 30px; border-radius: 8px; width: 100%; max-width: 950px; color: #1e2329; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

        /* NOUVEAU : DASHBOARD IA */
        .ai-dashboard { display: grid; grid-template-columns: 200px 1fr; gap: 20px; margin-bottom: 25px; display: none; }
        .ai-card { background: #f8fafc; border: 1px solid #dcdfe4; border-radius: 8px; padding: 15px; text-align: center; }
        .ai-logs { background: #161a1e; color: var(--engineer-green); border-radius: 8px; padding: 15px; font-family: 'Consolas', monospace; font-size: 12px; overflow: auto; white-space: pre-wrap; min-height: 80px; max-height: 240px; }
        
        .confidence-bar-container { background: #edf2f7; height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .confidence-bar { height: 100%; width: 0%; background: var(--accent); transition: width 1s ease-in-out; }

        .meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f1f3f5; }
        .meta-item b { color: #787b86; font-size: 10px; text-transform: uppercase; display: block; }
        .meta-item span { font-size: 15px; color: #1e2329; font-weight: 700; }

        .engineer-container { background: #161a1e; border-radius: 6px; padding: 20px; border-left: 5px solid var(--yellow-pro); }
        .engineer-container label { color: var(--yellow-pro); font-size: 12px; font-weight: 800; letter-spacing: 1px; display: block; margin-bottom: 10px; }

        textarea { width: 100%; height: 200px; background: transparent; color: var(--engineer-green); border: none; font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; align-items: center; flex-wrap: wrap; }
        .btn-analyze { background: var(--yellow-pro); color: #000; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; font-weight: 800; text-transform: uppercase; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; font-weight: 800; text-transform: uppercase; }
        
        .loading-spinner { display: none; color: var(--accent); font-weight: bold; font-size: 12px; }

        .advice-banner { background: #e7f0ff; border: 1px solid #2962ff; padding: 10px 15px; border-radius: 4px; margin-bottom: 20px; font-size: 13px; color: #1e4bd8; display: flex; align-items: center; gap: 10px; }
        .btn-back { text-decoration: none; color: var(--text-dim); font-size: 11px; margin-top: 10px; display: inline-block; font-weight: 600; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Journal Technique</h2>
            <a href="/" class="btn-back">← TERMINAL DE TRADING LIVE</a>
        </div>
        <div id="gallery-list">Chargement des fichiers...</div>
    </div>

    <div class="main-content">
        <img id="viewer" src="" alt="Capture plein écran">
        
        <div class="info-panel" id="image-info">
            <div class="advice-banner">
                <strong>💡 RECOMMANDATION :</strong> 
                <span id="dynamic-advice">Sélectionnez une capture pour générer les conseils d'ingénierie.</span>
            </div>

            <div class="meta-grid" id="meta-content">
                <p id="placeholder-text" style="color: #787b86;">En attente de sélection...</p>
            </div>

            <div class="ai-dashboard" id="ai-panel">
                <div class="ai-card">
                    <b style="font-size: 10px; color: var(--text-dim);">DÉCISION IA</b>
                    <div id="ai-decision" style="font-size: 22px; font-weight: 900; margin: 10px 0;">--</div>
                    <div class="confidence-bar-container">
                        <div class="confidence-bar" id="ai-bar"></div>
                    </div>
                    <span id="ai-percent" style="font-size: 12px; font-weight: 800; color: var(--accent);">0%</span>
                </div>
                <div class="ai-logs" id="ai-reasoning">> En attente du déclenchement de l'analyse...</div>
            </div>

            <div id="notes-section" style="display: none;">
                <div class="engineer-container">
                    <label> [ MODULE D'ANALYSE DÉCISIONNELLE ]</label>
                    <textarea id="user-notes" placeholder="Rapport technique..."></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn-analyze" id="btn-trigger-ai" onclick="triggerAIAnalysis()" title="Analyser la capture">Analyser</button>
                    <button class="btn-save" onclick="saveNotes()">ARCHIVER LE RAPPORT</button>
                    <span class="loading-spinner" id="spinner">ANALYSE EN COURS...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentFileName = "";
        const viewer = document.getElementById('viewer');
        const metaContent = document.getElementById('meta-content');
        const notesSection = document.getElementById('notes-section');
        const userNotes = document.getElementById('user-notes');

        /*
            IMPORTANT :
            - Si analyse.html est servi par Render, API_URL reste vide et les routes /api/... fonctionnent.
            - Si analyse.html est sur GitHub Pages, l'appel /api/... ne peut pas fonctionner.
              Dans ce cas, API_URL pointe vers Render.
            - Vous pouvez modifier cette URL si votre service Render change.
        */
        const RENDER_API_URL = "https://trading-g8ie.onrender.com";
        const API_URL = window.API_URL || localStorage.getItem("API_URL") || (window.location.hostname.includes("github.io") ? RENDER_API_URL : "");

        function apiPath(route) {
            return `${API_URL}${route}`;
        }

        function mediaPath(route) {
            return `${API_URL}${route}`;
        }

        function setLog(message) {
            const el = document.getElementById('ai-reasoning');
            if (el) el.innerText = message;
        }

        function safeText(value) {
            if (value === undefined || value === null || value === "") return "N/A";
            return String(value);
        }

        function normalizeAnalysis(data) {
            const decision = String(data?.decision || "ATTENDRE").toUpperCase();
            const confidenceNumber = Number(data?.confidence);
            const confidence = Number.isFinite(confidenceNumber) ? Math.max(0, Math.min(100, confidenceNumber)) : 0;
            const reasoning = data?.reasoning || data?.raison || "Aucune justification reçue.";
            return { decision, confidence, reasoning };
        }

        async function fetchWithTimeout(url, options = {}, timeoutMs = 120000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            try {
                return await fetch(url, { ...options, signal: controller.signal });
            } finally {
                clearTimeout(timer);
            }
        }

        async function loadGallery() {
            try {
                setLog("> Chargement de la galerie...");
                const response = await fetchWithTimeout(apiPath('/api/list'), {}, 30000);
                const raw = await response.text();

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} - ${raw}`);
                }

                let files;
                try {
                    files = JSON.parse(raw);
                } catch (e) {
                    throw new Error("Réponse /api/list non JSON : " + raw);
                }

                const galleryList = document.getElementById('gallery-list');
                if (!files || files.length === 0) {
                    galleryList.innerHTML = "<p style='color:var(--text-dim); padding:20px;'>Aucun setup archivé.</p>";
                    return;
                }
                galleryList.innerHTML = "";
                files.forEach(fileName => {
                    const container = document.createElement('div');
                    container.className = 'thumb-container';
                    container.id = 'thumb-' + fileName.replace(/[^a-zA-Z0-9_-]/g, '-');
                    container.innerHTML = `<img src="${mediaPath('/screenshots/' + encodeURIComponent(fileName))}"><div class="thumb-label">${fileName}</div>`;
                    container.onclick = () => selectImage(fileName);
                    galleryList.appendChild(container);
                });
                setLog("> Galerie chargée. Sélectionnez une capture.");
            } catch (error) {
                console.error(error);
                document.getElementById('gallery-list').innerHTML = "<p style='color:#f6465d; padding:20px;'>Erreur de chargement de la galerie. Vérifiez le serveur Render et la route /api/list.</p>";
                setLog("> ERREUR GALERIE :\n" + error.message);
            }
        }

        async function selectImage(fileName) {
            currentFileName = fileName;
            document.querySelectorAll('.thumb-container').forEach(t => t.classList.remove('active'));
            const active = document.getElementById('thumb-' + fileName.replace(/[^a-zA-Z0-9_-]/g, '-'));
            if (active) active.classList.add('active');

            viewer.src = mediaPath(`/screenshots/${encodeURIComponent(fileName)}`);
            viewer.style.display = "block";
            notesSection.style.display = "block";
            document.getElementById('ai-panel').style.display = "grid";
            document.getElementById('ai-decision').innerText = "--";
            document.getElementById('ai-bar').style.width = "0%";
            document.getElementById('ai-percent').innerText = "0%";
            setLog("> Capture sélectionnée : " + fileName + "\n> En attente du déclenchement de l'analyse...");

            try {
                const jsonName = fileName.replace(/\.(png|jpg|jpeg|webp)$/i, '.json');
                const res = await fetchWithTimeout(mediaPath(`/screenshots/${encodeURIComponent(jsonName)}`), {}, 30000);
                if (res.ok) {
                    const meta = await res.json();
                    metaContent.innerHTML = `
                        <div class="meta-item"><b>Date</b><span>${safeText(meta.date)}</span></div>
                        <div class="meta-item"><b>Actif</b><span style="color:var(--accent)">${safeText(meta.asset)}</span></div>
                        <div class="meta-item"><b>Intervalle</b><span>${safeText(meta.interval)}</span></div>
                    `;
                    userNotes.value = meta.notes || "// --- RAPPORT D'INGÉNIEUR ---\n1. ANALYSE STRUCTURELLE :\n\n2. ÉVALUATION DES RISQUES :\n\n3. RECOMMANDATIONS TECHNIQUES :";
                    
                    // Si l'IA a déjà analysé (données présentes dans le JSON)
                    if (meta.ai_analysis) renderAIResults(meta.ai_analysis);
                } else {
                    metaContent.innerHTML = `
                        <div class="meta-item"><b>Fichier</b><span>${fileName}</span></div>
                        <div class="meta-item"><b>Métadonnées</b><span>JSON absent</span></div>
                        <div class="meta-item"><b>État</b><span>Analyse possible</span></div>
                    `;
                    userNotes.value = "// --- RAPPORT D'INGÉNIEUR ---\n1. ANALYSE STRUCTURELLE :\n\n2. ÉVALUATION DES RISQUES :\n\n3. RECOMMANDATIONS TECHNIQUES :";
                }
            } catch (e) {
                console.error(e);
                setLog("> Capture sélectionnée, mais les métadonnées JSON n'ont pas pu être lues.\n> Détail : " + e.message);
            }
        }

        async function triggerAIAnalysis() {
            const btn = document.getElementById('btn-trigger-ai');
            const spinner = document.getElementById('spinner');

            if (!currentFileName) {
                alert("Aucune capture sélectionnée.");
                return;
            }

            btn.disabled = true;
            btn.style.display = "none";
            spinner.style.display = "inline";
            spinner.innerText = "ANALYSE EN COURS...";
            setLog("> Analyse en cours...\n> Envoi de la capture au serveur IA.\n> Fichier : " + currentFileName);

            try {
                // Appel vers server.js qui communique avec OpenAI Vision
                const response = await fetchWithTimeout(apiPath('/api/analyze-vision'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fileName: currentFileName })
                }, 120000);

                const texteBrut = await response.text();

                console.log("STATUT HTTP :", response.status);
                console.log("RÉPONSE BRUTE :", texteBrut);

                if (!response.ok) {
                    let messageErreur = texteBrut;
                    try {
                        const errJson = JSON.parse(texteBrut);
                        messageErreur = errJson.details || errJson.error || errJson.message || texteBrut;
                    } catch (e) {}

                    setLog("> ERREUR ANALYSE IA :\n> Statut HTTP : " + response.status + "\n> " + messageErreur);
                    alert(
                        "Erreur analyse IA.\n\n" +
                        "Statut HTTP : " + response.status + "\n\n" +
                        "Réponse serveur :\n" + messageErreur
                    );
                    return;
                }

                let data;
                try {
                    data = JSON.parse(texteBrut);
                } catch (e) {
                    setLog("> ERREUR : le serveur n'a pas retourné du JSON valide.\n" + texteBrut);
                    alert("Le serveur n'a pas retourné du JSON valide.\n\n" + texteBrut);
                    return;
                }

                if (!data.analysis) {
                    setLog("> ERREUR : réponse reçue, mais data.analysis est absent.\n" + texteBrut);
                    alert("Réponse reçue, mais data.analysis est absent.\n\n" + texteBrut);
                    return;
                }

                const analysis = normalizeAnalysis(data.analysis);
                renderAIResults(analysis);

                // On injecte automatiquement le résultat dans les notes
                userNotes.value +=
                    "\n\n[IA DECISION] : " + analysis.decision +
                    "\n[CONFIANCE] : " + analysis.confidence + "%" +
                    "\n[RAISON] : " + analysis.reasoning;

                document.getElementById('dynamic-advice').innerText = "Analyse terminée : " + analysis.decision + " avec " + analysis.confidence + "% de confiance.";
                alert("Analyse terminée.");
            } catch (err) {
                console.error("ERREUR FETCH :", err);
                const isAbort = err.name === "AbortError";
                const msg = isAbort
                    ? "L'analyse a dépassé le délai maximal. Le serveur ou OpenAI n'a pas répondu à temps."
                    : err.message;

                setLog(
                    "> ERREUR RÉSEAU :\n" + msg +
                    "\n\nCauses possibles :\n" +
                    "- serveur Render arrêté ;\n" +
                    "- mauvaise URL API ;\n" +
                    "- route /api/analyze-vision absente ;\n" +
                    "- problème CORS ;\n" +
                    "- clé OPENAI_API_KEY absente ou invalide ;\n" +
                    "- crédit OpenAI insuffisant."
                );

                alert(
                    "Erreur réseau lors de l'analyse IA.\n\n" + msg + "\n\n" +
                    "Vérifiez la console du navigateur et les logs Render."
                );
            } finally {
                btn.disabled = false;
                btn.style.display = "inline";
                spinner.style.display = "none";
            }
        }

        function renderAIResults(data) {
            const analysis = normalizeAnalysis(data);
            const decisionEl = document.getElementById('ai-decision');
            const barEl = document.getElementById('ai-bar');
            
            decisionEl.innerText = analysis.decision;
            decisionEl.style.color = analysis.decision === "ACHETER" ? "var(--buy-green)" : (analysis.decision === "VENDRE" ? "var(--sell-red)" : "var(--yellow-pro)");
            
            barEl.style.width = analysis.confidence + "%";
            document.getElementById('ai-percent').innerText = analysis.confidence + "%";
            document.getElementById('ai-reasoning').innerText = "> ANALYSE TERMINÉE :\n" + analysis.reasoning;
        }

        async function saveNotes() {
            if (!currentFileName) return;
            try {
                const response = await fetchWithTimeout(apiPath('/api/update-notes'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fileName: currentFileName.replace(/\.(png|jpg|jpeg|webp)$/i, '.json'), notes: userNotes.value })
                }, 30000);

                const texteBrut = await response.text();
                if (response.ok) {
                    alert("✅ Rapport archivé.");
                } else {
                    alert("Impossible d'archiver le rapport.\n\n" + texteBrut);
                }
            } catch (err) {
                alert("Erreur réseau pendant l'archivage.\n\n" + err.message);
            }
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
